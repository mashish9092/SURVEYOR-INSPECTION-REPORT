<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #2f6ecb, #6ea8ff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:white;
  padding:40px;
  width:320px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
  color:#2f6ecb;
}

.input-box{
  width:100%;
  margin-bottom:15px;
}

.input-box input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
  transition:0.3s;
}

.input-box input:focus{
  border-color:#2f6ecb;
  outline:none;
  box-shadow:0 0 5px rgba(47,110,203,0.4);
}

button{
  width:100%;
  padding:10px;
  background:#2f6ecb;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1d4fa3;
}

.footer{
  margin-top:15px;
  font-size:12px;
  color:#888;
}

</style>
</head>

<body>

<div class="login-box">

  <h2>🔐 Login</h2>

  <div class="input-box">
    <input type="text" id="username" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button onclick="login()">Login</button>

  <div class="footer">
    Survey System
  </div>

</div>

<script src="config.js"></script>

<script>

function login(){

  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  let script = document.createElement("script");

  script.src = API_MAIN + 
    "?action=login" +
    "&username=" + encodeURIComponent(username) +
    "&password=" + encodeURIComponent(password) +
    "&callback=handleLogin";

  document.body.appendChild(script);
}


function handleLogin(res){

  if(res.status === "success"){

    localStorage.setItem("isLoggedIn","true");
    localStorage.setItem("username", "admin");
    localStorage.setItem("role", res.role);

    window.location.href = "index.html";

  }else{
    alert("Invalid Login ❌");
  }
}

</script>

</body>
</html>
