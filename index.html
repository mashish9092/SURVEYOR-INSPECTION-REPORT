<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body class="page-container">

<!-- HEADER -->
<div class="header">
  <div class="title">📊 Survey System</div>
  <div id="dateTime"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
  <a href="register.html">📘 खरीदी रजिस्टर</a>
  <a href="contact.html">📞 Contact</a>
</div>

<!-- MAIN -->
<div class="main content">
<div class="box">

<h2>📋 Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<br>

<div class="btn-group">
<button class="btn add" onclick="addRow()">➕ Add Row</button>
<button class="btn save" onclick="saveData()">💾 Save & Generate</button>
</div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
  © <span id="year"></span> Survey System | Developed by <b>Ashish Mehra</b>
</div>

<script src="config.js"></script>

<script>

let rowCount = 0;

// ➕ ADD ROW
function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}" type="number"></td>
    <td><input id="foreign${rowCount}" type="number"></td>
    <td><input id="other${rowCount}" type="number"></td>
    <td><input id="damaged2${rowCount}" type="number"></td>
    <td><input id="slight${rowCount}" type="number"></td>
    <td><input id="damaged6${rowCount}" type="number"></td>
    <td><input id="moisture${rowCount}" type="number"></td>
    <td>
      <select id="status${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="remark${rowCount}"></td>
    <td><button class="btn cancel" onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
  updateSr();
}

// ❌ DELETE
function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

// 🔢 SR NO
function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i + 1;
  });
}

// 💾 SAVE DATA
async function saveData(){

  let rows = [];
  let allRows = document.querySelectorAll("#tableBody tr");

  for(let row of allRows){

    let i = row.id.replace("row","");

    let data = {
      name:getVal("name"+i),
      reg:getVal("reg"+i),
      qty:getVal("qty"+i),
      foreign:getVal("foreign"+i),
      other:getVal("other"+i),
      damaged2:getVal("damaged2"+i),
      slight:getVal("slight"+i),
      damaged6:getVal("damaged6"+i),
      moisture:getVal("moisture"+i),
      status:getVal("status"+i),
      remark:getVal("remark"+i)
    };

    if(data.name) rows.push(data);
  }

  if(rows.length === 0){
    alert("Fill at least one row");
    return;
  }

  console.log("Sending Data:", rows);

  try{

    // 🔥 SAVE TO GOOGLE SHEET
    await fetch(API_MAIN,{
      method:"POST",
      mode:"no-cors",
      body: JSON.stringify({
        action:"bulkAdd",
        rows: rows
      })
    });

    // 🔥 SAVE CURRENT SESSION (IMPORTANT)
    localStorage.setItem("currentReport", JSON.stringify(rows));

    alert("Saved Successfully ✅");

    // 🔥 GO TO REPORT
    window.location.href = "report.html";

  }catch(e){
    alert("Error saving data ❌");
  }
}

// 🔎 GET VALUE
function getVal(id){
  return document.getElementById(id)?.value || "";
}

// 🕒 DATE TIME
function updateDateTime(){
  let now = new Date();

  document.getElementById("dateTime").innerText =
    now.toLocaleDateString('en-IN') + " | " + now.toLocaleTimeString();
}

// 🚀 INIT
window.onload = function(){
  addRow();
  updateDateTime();
  setInterval(updateDateTime,1000);

  document.getElementById("year").innerText = new Date().getFullYear();
};

</script>

</body>
</html>
