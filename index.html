<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="page-container">

<!-- HEADER -->
<div class="header">

  <div class="header-left"></div>

  <div class="title">📊 Survey System</div>

  <div id="dateTime"></div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
  <a href="contact.html">📞 Contact</a>
</div>

<!-- MAIN -->
<div class="main content">
<div class="box">

<h2>📋 Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<br>

<div class="btn-group">
<button class="btn add" onclick="addRow()">➕ Add Row</button>
<button class="btn save" onclick="saveData()">💾 Save & Generate</button>
</div>

</div>
</div>

<!-- FOOTER (FIXED) -->
<div class="footer">
  © <span id="year"></span> Survey System | All Rights Reserved <br>
  Developed by <b>Ashish Mehra</b>
</div>

<script src="config.js"></script>

<script>

let rowCount = 0;

function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}" type="number"></td>
    <td><input id="foreign${rowCount}" type="number"></td>
    <td><input id="other${rowCount}" type="number"></td>
    <td><input id="damaged2${rowCount}" type="number"></td>
    <td><input id="slight${rowCount}" type="number"></td>
    <td><input id="damaged6${rowCount}" type="number"></td>
    <td><input id="moisture${rowCount}" type="number"></td>
    <td>
      <select id="status${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="remark${rowCount}"></td>
    <td><button class="btn cancel" onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
  updateSr();
}

function deleteRow(id){
  document.getElementById("row"+id).remove();
  updateSr();
}

function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i + 1;
  });
}

async function saveData(){

  let rows = [];
  let allRows = document.querySelectorAll("#tableBody tr");

  if(allRows.length === 0){
    alert("Add at least 1 row");
    return;
  }

  for(let row of allRows){

    let i = row.id.replace("row","");

    let data = {
      name:getVal("name"+i),
      reg:getVal("reg"+i),
      qty:getVal("qty"+i),
      foreign:getVal("foreign"+i),
      other:getVal("other"+i),
      damaged2:getVal("damaged2"+i),
      slight:getVal("slight"+i),
      damaged6:getVal("damaged6"+i),
      moisture:getVal("moisture"+i),
      status:getVal("status"+i),
      remark:getVal("remark"+i)
    };

    if(!data.name) continue;

    rows.push(data);
  }

  if(rows.length === 0){
    alert("Fill at least one row");
    return;
  }

  if(typeof API !== "undefined"){
    await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        action:"bulkAdd",
        rows: rows
      })
    });
  }

  localStorage.setItem("reportData",JSON.stringify({
    grader:getVal("grader"),
    warehouse:getVal("warehouse"),
    society:getVal("society"),
    date:getVal("date"),
    rows
  }));

  alert("Saved Successfully ✅");
  window.location.href = "report.html";
}

function getVal(id){
  return document.getElementById(id)?.value || "";
}

// DATE TIME
function updateDateTime(){
  let now = new Date();
  let options = { weekday:'short', day:'2-digit', month:'short', year:'numeric' };
  let date = now.toLocaleDateString('en-IN', options);
  let time = now.toLocaleTimeString();
  document.getElementById("dateTime").innerText = `${date} | ${time}`;
}

setInterval(updateDateTime,1000);
updateDateTime();

// YEAR
document.getElementById("year").innerText = new Date().getFullYear();

window.onload = ()=> addRow();

</script>

</body>
</html>
