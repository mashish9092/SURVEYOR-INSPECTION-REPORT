<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .box {
      max-width: 1200px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 6px;
      margin: 3px 0;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: auto;
    }

   table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto; /* important change */
}

th, td {
  border: 1px solid black;
  padding: 6px;
  font-size: 12px;
  text-align: center;
}

th {
  background: #f2f2f2;
  white-space: normal;      /* text wrap */
  word-wrap: break-word;    /* break long words */
    font-size: 11px;
  line-height: 1.2;
}

/* Mobile scroll fix */
.table-container {
  overflow-x: auto;
}
    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn {
      background: #007bff;
    }

    .submit-btn {
      background: green;
      width: 100%;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 4px;
      cursor: pointer;
    }
    .table-container {
  overflow-x: auto;
}
    th {
  white-space: nowrap;
}

  </style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

  <div  class="table-container">
<table >
<thead>
<tr>
<th style="min-width:60px;">Sr.no.</th>
<th style="min-width:150px;">Name Of Farmer/Society</th>
<th style="min-width:120px;">Farmer Registration</th>
<th style="min-width:120px;">Qty In Quintals (Approx)</th>
<th style="min-width:120px;">FOREIGN METTER (0.75%)</th>
<th style="min-width:120px;">OTHER FOOD GRAINS (2%)</th>
<th style="min-width:120px;">DAMAGED GRAINS (2%)</th>
<th style="min-width:120px;">SLIGHT DAMAGED GRAINS (4%)</th>
<th style="min-width:120px;">DAMAGED GRAINS (6%)</th>
<th style="min-width:120px;">MOISTURE (12%)</th>
<th style="min-width:120px;">Status FAQ/Non FAQ</th>
<th style="min-width:150px;">Remark If Any</th>
<th style="min-width:80px;">Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
  </div>
<button class="btn add-btn" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn submit-btn" onclick="saveData()">Submit</button>

</div>

<script>

let rowCount = 0;

// ADD ROW
function addRow() {
  rowCount++;

  const row = `
  <tr id="row${rowCount}">
    <td>${rowCount}</td>

    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input type="number" step="any" id="qty${rowCount}"></td>

    <td><input type="number" step="any" id="foreign${rowCount}"></td>
    <td><input type="number" step="any" id="other${rowCount}"></td>
    <td><input type="number" step="any" id="damage2${rowCount}"></td>
    <td><input type="number" step="any" id="damage4${rowCount}"></td>
    <td><input type="number" step="any" id="damage6${rowCount}"></td>
    <td><input type="number" step="any" id="moisture${rowCount}"></td>

    <td>
      <select id="status${rowCount}">
        <option value="FAQ">FAQ</option>
        <option value="Non-FAQ">Non-FAQ</option>
      </select>
    </td>

    <td><input id="remark${rowCount}"></td>

    <td>
      <button onclick="deleteRow(${rowCount})" class="delete-btn">X</button>
    </td>
  </tr>
  `;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
}
// DELETE ROW
function deleteRow(id) {
  const row = document.getElementById("row" + id);
  if (row) row.remove();
}

// DEFAULT ROWS
window.onload = function () {
  for (let i = 0; i < 5; i++) addRow();
};

// SAVE DATA + API CALL
function saveData() {

  let rows = [];

  for (let i = 1; i <= rowCount; i++) {

    let name = document.getElementById("name" + i)?.value || "";

    if (name !== "") {  // ✅ only filled rows save
      rows.push({
        name,
        reg: document.getElementById("reg" + i)?.value || "",
        qty: document.getElementById("qty" + i)?.value || "",
        foreign: document.getElementById("foreign" + i)?.value || "",
        other: document.getElementById("other" + i)?.value || "",
        damage2: document.getElementById("damage2" + i)?.value || "",
        damage4: document.getElementById("damage4" + i)?.value || "",
        damage6: document.getElementById("damage6" + i)?.value || "",
        moisture: document.getElementById("moisture" + i)?.value || "",
        status: document.getElementById("status" + i)?.value || "",
        remark: document.getElementById("remark" + i)?.value || ""
      });
    }
  }

  const data = {
    grader: grader.value,
    warehouse: warehouse.value,
    society: society.value,
    date: date.value,
    sign1: sign1.value,
    sign2: sign2.value,
    rows: rows
  };

  localStorage.setItem("reportData", JSON.stringify(data));

  alert("Data Saved Successfully ✅");
}

  // API CALL
  fetch("https://script.google.com/macros/s/AKfycbxJpf3bJ6LVdgnC4omAk3bBmUp0Ns4BQcEFc60Pggy1m53cCqMt-ZMMY2DJT7gt5FKE/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  // NEXT PAGE
  window.location.href = "report.html";
}

</script>

</body>
</html>
