<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .box {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid black;
      padding: 4px;
      font-size: 12px;
      text-align: center;
    }

    th {
      background: #eee;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn {
      background: #007bff;
      width: auto;
    }

    .submit-btn {
      background: green;
      width: 100%;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 3px 6px;
      cursor: pointer;
      font-size: 10px;
    }

  </style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<table>
<thead>
<tr>
<th>Sr No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damage 2%</th>
<th>Slight 4%</th>
<th>Damage 6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<button class="btn add-btn" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn submit-btn" onclick="saveData()">Submit</button>

</div>

<script>

let rowCount = 0;

// ADD ROW
function addRow() {
  rowCount++;

  const row = `
    <tr id="row${rowCount}">
      <td>
        ${rowCount}
        <br>
        <button class="delete-btn" onclick="deleteRow(${rowCount})">X</button>
      </td>
      <td><input id="name${rowCount}"></td>
      <td><input id="reg${rowCount}"></td>
      <td><input type="number" step="any" id="qty${rowCount}"></td>
      <td><input type="number" step="any" id="f${rowCount}"></td>
      <td><input type="number" step="any" id="o${rowCount}"></td>
      <td><input type="number" step="any" id="d2${rowCount}"></td>
      <td><input type="number" step="any" id="d4${rowCount}"></td>
      <td><input type="number" step="any" id="d6${rowCount}"></td>
      <td><input type="number" step="any" id="m${rowCount}"></td>
      <td><input id="s${rowCount}"></td>
      <td><input id="r${rowCount}"></td>
    </tr>
  `;

  document.getElementById("tableBody").innerHTML += row;
}

// DELETE ROW
function deleteRow(id) {
  const row = document.getElementById("row" + id);
  if (row) row.remove();
}

// DEFAULT 5 ROWS
window.onload = function () {
  for (let i = 0; i < 5; i++) {
    addRow();
  }
}

// SAVE DATA
function saveData() {

  let rows = [];

  for (let i = 1; i <= rowCount; i++) {

    let name = document.getElementById("name" + i)?.value || "";
    let reg = document.getElementById("reg" + i)?.value || "";
    let qty = document.getElementById("qty" + i)?.value || "";

    // ONLY FILLED ROWS SAVE
    if (name || reg || qty) {
      rows.push({
        name,
        reg,
        qty,
        f: document.getElementById("f" + i)?.value || "",
        o: document.getElementById("o" + i)?.value || "",
        d2: document.getElementById("d2" + i)?.value || "",
        d4: document.getElementById("d4" + i)?.value || "",
        d6: document.getElementById("d6" + i)?.value || "",
        m: document.getElementById("m" + i)?.value || "",
        s: document.getElementById("s" + i)?.value || "",
        r: document.getElementById("r" + i)?.value || ""
      });
    }
  }

  const data = {
    grader: document.getElementById("grader").value,
    warehouse: document.getElementById("warehouse").value,
    society: document.getElementById("society").value,
    date: document.getElementById("date").value,
    sign1: document.getElementById("sign1").value,
    sign2: document.getElementById("sign2").value,
    rows: rows
  };

  localStorage.setItem("reportData", JSON.stringify(data));

  window.location.href = "report.html";
}

</script>

</body>
</html>
