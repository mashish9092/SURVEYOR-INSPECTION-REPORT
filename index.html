<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Survey System</div>

<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society/Procurement Centre">
<input type="date" id="date">

<br><br>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN MATTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<br>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="saveData()">💾 Save & Generate Report</button>

</div>
</div>

<script src="config.js"></script>

<script>

let rowCount = 0;

// ADD ROW
function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}" type="number"></td>
    <td><input id="foreign${rowCount}" type="number"></td>
    <td><input id="other${rowCount}" type="number"></td>
    <td><input id="damaged2${rowCount}" type="number"></td>
    <td><input id="slight${rowCount}" type="number"></td>
    <td><input id="damaged6${rowCount}" type="number"></td>
    <td><input id="moisture${rowCount}" type="number"></td>
    <td>
      <select id="status${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="remark${rowCount}"></td>
    <td><button onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  tableBody.insertAdjacentHTML("beforeend", row);
  updateSr();
}

// DELETE
function deleteRow(id){
  document.getElementById("row"+id).remove();
  updateSr();
}

// SR NO FIX
function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i + 1;
  });
}

// SAVE
async function saveData(){

  let rows=[];
  let allRows=document.querySelectorAll("#tableBody tr");

  if(allRows.length===0){
    alert("Add at least 1 row");
    return;
  }

  for(let row of allRows){

    let i=row.id.replace("row","");

    let data={
      name:getVal("name"+i),
      reg:getVal("reg"+i),
      qty:getVal("qty"+i),
      foreign:getVal("foreign"+i),
      other:getVal("other"+i),
      damaged2:getVal("damaged2"+i),
      slight:getVal("slight"+i),
      damaged6:getVal("damaged6"+i),
      moisture:getVal("moisture"+i),
      status:getVal("status"+i),
      remark:getVal("remark"+i)
    };

    if(!data.name) continue;

    rows.push(data);

    // API SAVE
    if(typeof API !== "undefined"){
      await fetch(API,{
        method:"POST",
        body:JSON.stringify({
          action:"add",
          ...data
        })
      });
    }
  }

  if(rows.length===0){
    alert("Fill at least one row");
    return;
  }

  localStorage.setItem("reportData",JSON.stringify({
    grader:getVal("grader"),
    warehouse:getVal("warehouse"),
    society:getVal("society"),
    date:getVal("date"),
    rows
  }));

  alert("Saved Successfully ✅");
  window.location.href="report.html";
}

function getVal(id){
  return document.getElementById(id)?.value || "";
}

window.onload=()=>addRow();

</script>

</body>
</html>
