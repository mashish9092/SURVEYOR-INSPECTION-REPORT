<!DOCTYPE html>
<html>
<head>
  <title>Survey System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="page-container">

<!-- HEADER -->
<div class="header">
  <div class="title">📊 Survey System</div>
  <div id="dateTime"></div>
</div>

<!-- MAIN -->
<div class="main content">
<div class="box">

<h2>📋 Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<br>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<br>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="saveData()">💾 Save</button>
<button onclick="exportExcel()">⬇ Export Excel</button>

<hr>

<h2>📄 Current Data</h2>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportBody"></tbody>
</table>

</div>
</div>

<script src="config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let rowCount = 0;

// ADD ROW
function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="foreign${rowCount}"></td>
    <td><input id="other${rowCount}"></td>
    <td><input id="damaged2${rowCount}"></td>
    <td><input id="slight${rowCount}"></td>
    <td><input id="damaged6${rowCount}"></td>
    <td><input id="moisture${rowCount}"></td>
    <td>
      <select id="status${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="remark${rowCount}"></td>
    <td><button onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
  updateSr();
}

// DELETE
function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

// SR NO
function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i + 1;
  });
}

// SAVE
function saveData(){

  let rows = [];

  document.querySelectorAll("#tableBody tr").forEach(row=>{
    let i = row.id.replace("row","");

    let data = {
      name:getVal("name"+i),
      reg:getVal("reg"+i),
      qty:getVal("qty"+i),
      foreign:getVal("foreign"+i),
      other:getVal("other"+i),
      damaged2:getVal("damaged2"+i),
      slight:getVal("slight"+i),
      damaged6:getVal("damaged6"+i),
      moisture:getVal("moisture"+i),
      status:getVal("status"+i),
      remark:getVal("remark"+i)
    };

    if(data.name) rows.push(data);
  });

  if(rows.length === 0){
    alert("Fill data first");
    return;
  }

  // SAVE LOCAL
  localStorage.setItem("currentReport", JSON.stringify(rows));

  // OPTIONAL API (ignore if fails)
  fetch(API_MAIN,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"bulkAdd", rows })
  }).catch(()=>{});

  alert("Saved ✅");

  renderTable();
}

// RENDER TABLE
function renderTable(){

  let data = JSON.parse(localStorage.getItem("currentReport")) || [];

  let html = "";

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.reg}</td>
      <td>${r.qty}</td>
      <td><button onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.getElementById("reportBody").innerHTML = html;
}

// EDIT
function editRow(i){

  let data = JSON.parse(localStorage.getItem("currentReport"));

  let r = data[i];

  r.name = prompt("Name", r.name) || r.name;
  r.qty = prompt("Qty", r.qty) || r.qty;

  localStorage.setItem("currentReport", JSON.stringify(data));

  renderTable();
}

// EXPORT
function exportExcel(){

  let data = JSON.parse(localStorage.getItem("currentReport")) || [];

  let arr = [["Sr.No","Name","Registration","Qty"]];

  data.forEach((r,i)=>{
    arr.push([i+1, r.name, r.reg, r.qty]);
  });

  let ws = XLSX.utils.aoa_to_sheet(arr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Survey.xlsx");

  localStorage.removeItem("currentReport");
  renderTable();
}

// GET VALUE
function getVal(id){
  return document.getElementById(id)?.value || "";
}

// DATE TIME
function updateDateTime(){
  let now = new Date();
  document.getElementById("dateTime").innerText =
    now.toLocaleString();
}

// INIT
window.onload = function(){
  addRow();
  renderTable();
  updateDateTime();
  setInterval(updateDateTime,1000);
};

</script>

</body>
</html>
