<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">Survey System</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button class="btn add" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<br><br>

<button class="btn excel" onclick="exportExcel()">⬇ Export Excel</button>
<button class="btn save" onclick="saveData()">💾 Save & Next</button>

</div>
</div>

<!-- POPUP EDIT -->
<div id="editPopup" class="popup">
  <div class="popup-box">
    <h3>Edit Record</h3>

    <input id="editName" placeholder="Name">
    <input id="editReg" placeholder="Registration">
    <input id="editQty" placeholder="Qty">
    <input id="editMoisture" placeholder="Moisture">

    <select id="editStatus">
      <option>FAQ</option>
      <option>Non-FAQ</option>
    </select>

    <br><br>

    <button class="btn save" onclick="updateRow()">Update</button>
    <button class="btn" onclick="closePopup()">Cancel</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Survey System | Developed by Ashish Mehra | Maintenance & Support Active
</div>

<script>

let rowCount = 0;
let currentEditRow = 0;

// ADD ROW
function addRow(){

  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td class="sr"></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>
    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="r${rowCount}"></td>
    <td>
      <button onclick="openEditPopup(${rowCount})">✏</button>
      <button onclick="deleteRow(${rowCount})">❌</button>
    </td>
  </tr>
  `;

  tableBody.insertAdjacentHTML("beforeend", row);
  updateSr();
}

// DELETE
function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

// SR FIX
function updateSr(){
  document.querySelectorAll(".sr").forEach((el,i)=>el.innerText=i+1);
}

// POPUP OPEN
function openEditPopup(id){

  currentEditRow = id;

  editName.value = document.getElementById("name"+id).value;
  editReg.value = document.getElementById("reg"+id).value;
  editQty.value = document.getElementById("qty"+id).value;
  editMoisture.value = document.getElementById("m"+id).value;
  editStatus.value = document.getElementById("s"+id).value;

  document.getElementById("editPopup").style.display = "flex";
}

// CLOSE POPUP
function closePopup(){
  document.getElementById("editPopup").style.display = "none";
}

// UPDATE ROW
function updateRow(){
   let data = {
    action:"update",
    name:editName.value,
    reg:editReg.value,
    qty:editQty.value,
    m:editMoisture.value,
    s:editStatus.value
  };

  await fetch("YOUR_API_URL",{
    method:"POST",
    body:JSON.stringify(data)
  });

  showToast("Updated Successfully 🔄");

  document.getElementById("name"+currentEditRow).value = editName.value;
  document.getElementById("reg"+currentEditRow).value = editReg.value;
  document.getElementById("qty"+currentEditRow).value = editQty.value;
  document.getElementById("m"+currentEditRow).value = editMoisture.value;
  document.getElementById("s"+currentEditRow).value = editStatus.value;

  closePopup();
}

// LOAD DEFAULT ROWS
window.onload = () => {
  for(let i=0;i<5;i++) addRow();
};

// SAVE
async function saveData(){

  for(let i=1;i<=rowCount;i++){

    let name = document.getElementById("name"+i)?.value;

    if(name){

      let data = {
        action:"add",
        name,
        reg:document.getElementById("reg"+i).value,
        qty:document.getElementById("qty"+i).value,
        f:document.getElementById("f"+i).value,
        o:document.getElementById("o"+i).value,
        d2:document.getElementById("d2"+i).value,
        d4:document.getElementById("d4"+i).value,
        d6:document.getElementById("d6"+i).value,
        m:document.getElementById("m"+i).value,
        s:document.getElementById("s"+i).value,
        r:document.getElementById("r"+i).value
      };

      await fetch("YOUR_API_URL",{
        method:"POST",
        body:JSON.stringify(data)
      });
    }
  }

  showToast("Saved Successfully ✅");
}
  async function deleteRow(id){

  let reg = document.getElementById("reg"+id).value;

  await fetch("YOUR_API_URL",{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      reg:reg
    })
  });

  document.getElementById("row"+id).remove();

  showToast("Deleted Successfully ❌");
}

// EXPORT
function exportExcel(){

  let table = document.querySelector("table").outerHTML;

  let blob = new Blob([table], {type:"application/vnd.ms-excel"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Survey_Report.xls";
  a.click();
}

</script>

</body>
</html>
