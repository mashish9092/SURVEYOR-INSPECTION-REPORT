<!DOCTYPE html>
<html>
<head>
  <title>Input Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f9; }
    .box { max-width:600px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    input, select { width:100%; padding:10px; margin:5px 0; }
    button { padding:10px; background:green; color:#fff; border:none; width:100%; }
  </style>
</head>

<body>

<div class="box">
  <h2>Farmer Entry Form</h2>

  <input id="name" placeholder="Name">
  <input id="reg" placeholder="Registration">
  <input type="number" step="any" id="qty" placeholder="Qty">
  <input type="number" step="any" id="moisture" placeholder="Moisture">

  <select id="status">
    <option>FAQ</option>
    <option>Non FAQ</option>
  </select>

  <button onclick="goNext()">Submit</button>
</div>

<script>
function goNext() {

  const data = {
    name: document.getElementById("name").value,
    reg: document.getElementById("reg").value,
    qty: document.getElementById("qty").value,
    moisture: document.getElementById("moisture").value,
    status: document.getElementById("status").value
  };

  // Save locally
  localStorage.setItem("formData", JSON.stringify(data));

  // Redirect
  window.location.href = "report.html";
}
</script>

</body>
</html>
