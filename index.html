<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<br><br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged (2%)</th>
<th>Slight (4%)</th>
<th>Damaged (6%)</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<br>

<div class="form-actions">
  <button class="btn add" onclick="addRow()">➕ Add Row</button>
  <button class="btn save" onclick="saveData()">💾 Save & Generate Report</button>
</div>

</div>
</div>

<div class="footer">
© 2026 Survey System | Developed by Ashish Mehra | Maintenance & Support Active
</div>

<div id="toast"></div>

<script>

let rowCount = 0;
const API = "PASTE_YOUR_API_URL_HERE"; // optional

// ADD ROW
function addRow(){

  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>
    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="r${rowCount}"></td>
    <td><button onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);

  updateSerialNumbers();
}

// DELETE
function deleteRow(id){
  document.getElementById("row"+id).remove();
  updateSerialNumbers();
  showToast("Row Deleted ❌");
}

// FIX SR.NO
function updateSerialNumbers(){
  let rows = document.querySelectorAll("#tableBody tr");
  rows.forEach((row, index)=>{
    row.cells[0].innerText = index + 1;
  });
}

// SAVE
function saveData(){

  let rowsData = [];

  document.querySelectorAll("#tableBody tr").forEach((row, index)=>{

    let i = row.id.replace("row","");

    let name = document.getElementById("name"+i).value;

    if(name){
      rowsData.push({
        name,
        reg: document.getElementById("reg"+i).value,
        qty: document.getElementById("qty"+i).value,
        foreign: document.getElementById("f"+i).value,
        other: document.getElementById("o"+i).value,
        damaged2: document.getElementById("d2"+i).value,
        slight: document.getElementById("d4"+i).value,
        damaged6: document.getElementById("d6"+i).value,
        moisture: document.getElementById("m"+i).value,
        status: document.getElementById("s"+i).value,
        remark: document.getElementById("r"+i).value
      });
    }

  });

  // SAVE TO LOCAL STORAGE
  localStorage.setItem("reportData", JSON.stringify({
    grader: grader.value,
    warehouse: warehouse.value,
    society: society.value,
    date: date.value,
    rows: rowsData
  }));

  showToast("Saved Successfully ✅");

  setTimeout(()=>{
    window.location.href="report.html";
  },1000);
}

// TOAST
function showToast(msg){
  let t = document.getElementById("toast");

  t.innerText = msg;
  t.style.position = "fixed";
  t.style.bottom = "20px";
  t.style.right = "20px";
  t.style.background = "#28a745";
  t.style.color = "white";
  t.style.padding = "10px 15px";
  t.style.borderRadius = "6px";
  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },3000);
}

// INIT
window.onload = ()=> addRow();

</script>

</body>
</html>
