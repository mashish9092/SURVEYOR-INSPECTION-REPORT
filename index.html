<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<br><br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>D2</th>
<th>D4</th>
<th>D6</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<br>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="saveData()">💾 Save & Generate Report</button>

</div>
</div>

<div class="footer">© 2026 Survey System</div>

<script>

let rowCount = 0;

function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>
    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="r${rowCount}"></td>
    <td><button onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  tableBody.insertAdjacentHTML("beforeend", row);
  updateSr();
}

function deleteRow(id){
  document.getElementById("row"+id).remove();
  updateSr();
}

function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i+1;
  });
}

function saveData(){

  let rows = [];

  document.querySelectorAll("#tableBody tr").forEach(row=>{
    let i = row.id.replace("row","");

    rows.push({
      name: name0(i),
      reg: val("reg"+i),
      qty: val("qty"+i),
      foreign: val("f"+i),
      other: val("o"+i),
      damaged2: val("d2"+i),
      slight: val("d4"+i),
      damaged6: val("d6"+i),
      moisture: val("m"+i),
      status: val("s"+i),
      remark: val("r"+i)
    });
  });

  localStorage.setItem("reportData", JSON.stringify({
    grader: grader.value,
    warehouse: warehouse.value,
    society: society.value,
    date: date.value,
    rows
  }));

  window.location.href="report.html";
}

function val(id){
  return document.getElementById(id)?.value || "";
}
function name0(i){
  return document.getElementById("name"+i)?.value || "";
}

window.onload = ()=> addRow();

</script>

</body>
</html>
