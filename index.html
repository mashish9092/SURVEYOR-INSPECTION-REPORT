<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 10px;
  margin: 0;
}

/* MAIN BOX */
.box {
  max-width: 1200px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
  box-sizing: border-box;
}

/* TABLE SCROLL */
.table-container {
  overflow-x: auto;
  margin-top: 10px;
}

/* TABLE */
table {
  min-width: 1600px;   /* 🔥 important */
  border-collapse: collapse;
}

/* HEADER */
th {
  background: #f1f1f1;
  font-size: 12px;
  padding: 6px;
  border: 1px solid black;
  text-align: center;
  white-space: normal;
  word-break: break-word;
}

/* CELL */
td {
  border: 1px solid black;
  padding: 2px;
  min-width: 100px;
}

/* 🔥 INPUT PERFECT FIT */
td input, td select {
  width: 100%;
  height: 28px;
  padding: 4px;
  margin: 0;
  border: 1px solid #ccc;
  box-sizing: border-box;   /* ⭐ MOST IMPORTANT */
  font-size: 12px;
}

/* BUTTONS */
.btn {
  padding: 10px;
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  border-radius: 5px;
  font-size: 14px;
}

.add { background: #007bff; }
.save { background: green; width: 100%; }
.excel { background: #28a745; }
.del { background: red; }

/* HOVER EFFECT */
.btn:hover {
  opacity: 0.9;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {

  .box {
    padding: 10px;
  }

  h2 {
    font-size: 18px;
  }

  input, select {
    font-size: 16px;
    padding: 12px;
  }

  td input, td select {
    font-size: 14px;
    height: 34px;
  }

  th {
    font-size: 10px;
  }

}

</style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN METTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button class="btn add" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn excel" onclick="exportExcel()">Export Excel</button>
<button class="btn save" onclick="saveData()">Save & Send</button>

</div>

<script>

let rowCount = 0;

function addRow() {
  rowCount++;
  const sr = document.querySelectorAll("#tableBody tr").length + 1;

  const row = `
  <tr id="row${rowCount}">
    <td class="sr">${sr}</td>

    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>

    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>

    <td><input id="r${rowCount}"></td>

    <td><button class="del" onclick="deleteRow(${rowCount})">X</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
  updateSr();
}

function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

function updateSr(){
  document.querySelectorAll(".sr").forEach((el,i)=>el.innerText=i+1);
}

// default rows
window.onload = () => {
  for(let i=0;i<5;i++) addRow();
}

// SAVE + API
function saveData(){

  let rows=[];

  for(let i=1;i<=rowCount;i++){
    let name=document.getElementById("name"+i)?.value;

    if(name){
      rows.push({
        name,
        reg:document.getElementById("reg"+i)?.value,
        qty:document.getElementById("qty"+i)?.value,
        f:document.getElementById("f"+i)?.value,
        o:document.getElementById("o"+i)?.value,
        d2:document.getElementById("d2"+i)?.value,
        d4:document.getElementById("d4"+i)?.value,
        d6:document.getElementById("d6"+i)?.value,
        m:document.getElementById("m"+i)?.value,
        s:document.getElementById("s"+i)?.value,
        r:document.getElementById("r"+i)?.value
      });
    }
  }

  const data={
    grader:grader.value,
    warehouse:warehouse.value,
    society:society.value,
    date:date.value,
    sign1:sign1.value,
    sign2:sign2.value,
    rows
  };

  // LOCAL SAVE (for edit page)
  localStorage.setItem("reportData",JSON.stringify(data));

  // 🔴 API CALL (अपना URL डालो)
  fetch("https://script.google.com/macros/s/AKfycbxJpf3bJ6LVdgnC4omAk3bBmUp0Ns4BQcEFc60Pggy1m53cCqMt-ZMMY2DJT7gt5FKE/exec",{
    method:"POST",
    body:JSON.stringify(data)
  });

  alert("Saved Successfully");
}

// EXCEL EXPORT
function exportExcel(){

  let table = document.querySelector("table").outerHTML;

  let blob = new Blob([table], {type:"application/vnd.ms-excel"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "Survey_Report.xls";
  a.click();
}

</script>

</body>
</html>
