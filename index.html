<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .box {
      max-width: 1200px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; }

    input, select {
      width: 100%;
      padding: 6px;
      margin: 3px 0;
      box-sizing: border-box;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid black;
      padding: 6px;
      font-size: 12px;
      text-align: center;
    }

    th {
      background: #eee;
      font-size: 11px;
      line-height: 1.2;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn { background: #007bff; }
    .submit-btn { background: green; width: 100%; }
    .excel-btn { background: #28a745; }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 4px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.no.</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals</th>
<th>Foreign (0.75%)</th>
<th>Other (2%)</th>
<th>Damage 2%</th>
<th>Damage 4%</th>
<th>Damage 6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button class="btn add-btn" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn excel-btn" onclick="exportExcel()">Export Excel</button>
<button class="btn submit-btn" onclick="saveData()">Submit</button>

</div>

<script>

let rowCount = 0;

// ADD ROW
function addRow() {

  rowCount++;

  const table = document.getElementById("tableBody");
  const srNo = table.rows.length + 1;   // ✅ FIX (real count)

  const row = `
  <tr id="row${rowCount}">
    <td class="sr">${srNo}</td>

    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input type="number" step="any" id="qty${rowCount}"></td>

    <td><input type="number" step="any" id="foreign${rowCount}"></td>
    <td><input type="number" step="any" id="other${rowCount}"></td>
    <td><input type="number" step="any" id="d2${rowCount}"></td>
    <td><input type="number" step="any" id="d4${rowCount}"></td>
    <td><input type="number" step="any" id="d6${rowCount}"></td>
    <td><input type="number" step="any" id="m${rowCount}"></td>

    <td>
      <select id="status${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>

    <td><input id="remark${rowCount}"></td>

    <td>
      <button onclick="deleteRow(${rowCount})" class="delete-btn">X</button>
    </td>
  </tr>
  `;

  table.insertAdjacentHTML("beforeend", row);

  updateSerialNumbers(); // ✅ important
}

// DELETE ROW
function deleteRow(id) {
  document.getElementById("row" + id)?.remove();
  updateSerialNumbers();
}
// DEFAULT ROWS
window.onload = function () {
  for (let i = 0; i < 5; i++) addRow();
};

  // Serial No. Fix function
  function updateSerialNumbers() {
  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach((row, index) => {
    row.querySelector(".sr").innerText = index + 1;
  });
}

// SAVE + API
function saveData() {

  let rows = [];

  for (let i = 1; i <= rowCount; i++) {

    let name = document.getElementById("name" + i)?.value || "";

    if (name !== "") {
      rows.push({
        name,
        reg: document.getElementById("reg" + i)?.value || "",
        qty: document.getElementById("qty" + i)?.value || "",
        foreign: document.getElementById("foreign" + i)?.value || "",
        other: document.getElementById("other" + i)?.value || "",
        d2: document.getElementById("d2" + i)?.value || "",
        d4: document.getElementById("d4" + i)?.value || "",
        d6: document.getElementById("d6" + i)?.value || "",
        m: document.getElementById("m" + i)?.value || "",
        status: document.getElementById("status" + i)?.value || "",
        remark: document.getElementById("remark" + i)?.value || ""
      });
    }
  }

  const data = {
    grader: grader.value,
    warehouse: warehouse.value,
    society: society.value,
    date: date.value,
    sign1: sign1.value,
    sign2: sign2.value,
    rows
  };

  localStorage.setItem("reportData", JSON.stringify(data));

  fetch("https://script.google.com/macros/s/AKfycbxJpf3bJ6LVdgnC4omAk3bBmUp0Ns4BQcEFc60Pggy1m53cCqMt-ZMMY2DJT7gt5FKE/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Saved Successfully ✅");
  })
  .catch(() => {
    alert("Sheet Error ❌");
  });
}

// EXPORT EXCEL
function exportExcel() {

  const data = JSON.parse(localStorage.getItem("reportData"));

  if (!data) return alert("No Data");

  let csv = [];

  csv.push(["Grader","Warehouse","Society","Date","Name","Reg","Qty","Foreign","Other","D2","D4","D6","Moisture","Status","Remark"].join(","));

  data.rows.forEach(r=>{
    csv.push([
      data.grader,
      data.warehouse,
      data.society,
      data.date,
      r.name,r.reg,r.qty,r.foreign,r.other,r.d2,r.d4,r.d6,r.m,r.status,r.remark
    ].join(","));
  });

  const blob = new Blob([csv.join("\n")], { type: "text/csv" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "Survey_Report.csv";
  link.click();
}

</script>

</body>
</html>
