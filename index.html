<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<br><br>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>D2</th>
<th>D4</th>
<th>D6</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<br>

<button onclick="addRow()">➕ Add Row</button>
<button onclick="saveData()">💾 Save & Generate Report</button>

</div>
</div>

<div class="footer">© 2026 Survey System</div>

<!-- ✅ API CONFIG -->
<script src="config.js"></script>

<script>

let rowCount = 0;

// ADD ROW
function addRow(){
  rowCount++;

  let row = `
  <tr id="row${rowCount}">
    <td></td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>
    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td><input id="r${rowCount}"></td>
    <td><button onclick="deleteRow(${rowCount})">❌</button></td>
  </tr>`;

  document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
  updateSr();
}

// DELETE
function deleteRow(id){
  document.getElementById("row"+id).remove();
  updateSr();
}

// SR NO FIX
function updateSr(){
  document.querySelectorAll("#tableBody tr").forEach((row,i)=>{
    row.cells[0].innerText = i+1;
  });
}

// SAVE DATA
async function saveData(){

  let rows = [];

  document.querySelectorAll("#tableBody tr").forEach(row=>{

    let i = row.id.replace("row","");

    let name = getVal("name"+i);

    if(name){   // ✅ EMPTY ROW SKIP
      let data = {
        name,
        reg: getVal("reg"+i),
        qty: getVal("qty"+i),
        f: getVal("f"+i),
        o: getVal("o"+i),
        d2: getVal("d2"+i),
        d4: getVal("d4"+i),
        d6: getVal("d6"+i),
        m: getVal("m"+i),
        s: getVal("s"+i),
        r: getVal("r"+i)
      };

      rows.push(data);

      // 🔥 GOOGLE SHEET SAVE
      if(typeof API !== "undefined"){
        await fetch(API,{
          method:"POST",
          body: JSON.stringify({
            action:"add",
            ...data
          })
        });
      }
    }

  });

  // SAVE FOR REPORT PAGE
  localStorage.setItem("reportData", JSON.stringify({
    grader: getVal("grader"),
    warehouse: getVal("warehouse"),
    society: getVal("society"),
    date: getVal("date"),
    rows
  }));

  alert("Saved Successfully ✅");

  window.location.href="report.html";
}

// HELPER
function getVal(id){
  return document.getElementById(id)?.value || "";
}

// INIT
window.onload = ()=> addRow();

</script>

</body>
</html>
