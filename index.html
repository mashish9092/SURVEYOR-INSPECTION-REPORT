<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .box {
      max-width: 1200px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 6px;
      margin: 3px 0;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid black;
      padding: 4px;
      font-size: 12px;
      text-align: center;
    }

    th {
      background: #eee;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn {
      background: #007bff;
    }

    .submit-btn {
      background: green;
      width: 100%;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 4px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<table>
<thead>
<tr>
<th>Sr.no.</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN METTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGEDN GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<button class="btn add-btn" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn submit-btn" onclick="saveData()">Submit</button>

</div>

<script>

let rowCount = 0;

// ADD ROW
const row = `
<tr id="row${rowCount}">
<td>${rowCount}</td>

<td><input id="name${rowCount}"></td>
<td><input id="reg${rowCount}"></td>
<td><input type="number" step="any" id="qty${rowCount}"></td>

<td><input type="number" step="any" id="foreign${rowCount}"></td>
<td><input type="number" step="any" id="other${rowCount}"></td>
<td><input type="number" step="any" id="damage2${rowCount}"></td>
<td><input type="number" step="any" id="damage4${rowCount}"></td>
<td><input type="number" step="any" id="damage6${rowCount}"></td>
<td><input type="number" step="any" id="moisture${rowCount}"></td>

<td><input id="status${rowCount}"></td>
<td><input id="remark${rowCount}"></td>

<td><button class="delete-btn" onclick="deleteRow(${rowCount})">Delete</button></td>
</tr>
`;
// DELETE ROW
function deleteRow(id) {
  const row = document.getElementById("row" + id);
  if (row) row.remove();
}

// DEFAULT ROWS
window.onload = function () {
  for (let i = 0; i < 5; i++) addRow();
};

// SAVE DATA + API CALL
function saveData() {

  let rows = [];

  for (let i = 1; i <= rowCount; i++) {

    let name = document.getElementById("name" + i)?.value || "";
    let reg = document.getElementById("reg" + i)?.value || "";
    let qty = document.getElementById("qty" + i)?.value || "";

    if (name || reg || qty) {
     rows.push({
  name,
  reg,
  qty,
  foreign: document.getElementById("foreign" + i)?.value || "",
  other: document.getElementById("other" + i)?.value || "",
  damage2: document.getElementById("damage2" + i)?.value || "",
  damage4: document.getElementById("damage4" + i)?.value || "",
  damage6: document.getElementById("damage6" + i)?.value || "",
  moisture: document.getElementById("moisture" + i)?.value || "",
  status: document.getElementById("status" + i)?.value || "",
  remark: document.getElementById("remark" + i)?.value || ""
});
    }
  }

  const data = {
    grader: document.getElementById("grader").value,
    warehouse: document.getElementById("warehouse").value,
    society: document.getElementById("society").value,
    date: document.getElementById("date").value,
    sign1: document.getElementById("sign1").value,
    sign2: document.getElementById("sign2").value,
    rows: rows
  };

  // SAVE LOCAL (report page ke liye)
  localStorage.setItem("reportData", JSON.stringify(data));

  // API CALL
  fetch("https://script.google.com/macros/s/AKfycbxJpf3bJ6LVdgnC4omAk3bBmUp0Ns4BQcEFc60Pggy1m53cCqMt-ZMMY2DJT7gt5FKE/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  // NEXT PAGE
  window.location.href = "report.html";
}

</script>

</body>
</html>
