<!DOCTYPE html>
<html>
<head>
<title>Survey Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:Arial;background:#f4f6f9;padding:20px;}
.box {max-width:1200px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
input,select {width:100%;padding:8px;margin:4px 0;}
.table-container {overflow-x:auto;}
table {min-width:1400px;border-collapse:collapse;}
th,td {border:1px solid #444;padding:5px;text-align:center;}
th {background:#eee;}
.btn {padding:10px;color:#fff;border:none;cursor:pointer;}
.add {background:#007bff;}
.save {background:green;width:100%;}
.del {background:red;}
</style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>D2</th>
<th>D4</th>
<th>D6</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button class="btn add" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn save" onclick="saveData()">Save & Send</button>

</div>

<script>

let rowCount=0;

function addRow(){
  rowCount++;
  let sr=document.querySelectorAll("#tableBody tr").length+1;

  let row=`
  <tr id="row${rowCount}">
  <td class="sr">${sr}</td>
  <td><input id="name${rowCount}"></td>
  <td><input id="reg${rowCount}"></td>
  <td><input id="qty${rowCount}"></td>
  <td><input id="f${rowCount}"></td>
  <td><input id="o${rowCount}"></td>
  <td><input id="d2${rowCount}"></td>
  <td><input id="d4${rowCount}"></td>
  <td><input id="d6${rowCount}"></td>
  <td><input id="m${rowCount}"></td>
  <td>
    <select id="s${rowCount}">
      <option>FAQ</option>
      <option>Non-FAQ</option>
    </select>
  </td>
  <td><input id="r${rowCount}"></td>
  <td><button class="del" onclick="deleteRow(${rowCount})">X</button></td>
  </tr>`;

  tableBody.insertAdjacentHTML("beforeend",row);
  updateSr();
}

function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

function updateSr(){
  document.querySelectorAll(".sr").forEach((e,i)=>e.innerText=i+1);
}

window.onload=()=>{for(let i=0;i<3;i++) addRow();};

/////////////////////////////////////////////////////
// 🔥 SAVE + SEND TO GOOGLE SHEET
/////////////////////////////////////////////////////

function saveData(){

  let rows=[];

  for(let i=1;i<=rowCount;i++){

    let name=document.getElementById("name"+i)?.value;

    if(name){
      rows.push({
        name,
        reg:reg[i]?.value,
        qty:qty[i]?.value,
        f:f[i]?.value,
        o:o[i]?.value,
        d2:d2[i]?.value,
        d4:d4[i]?.value,
        d6:d6[i]?.value,
        m:m[i]?.value,
        s:s[i]?.value,
        r:r[i]?.value
      });
    }
  }

  let payload=[];

  rows.forEach(r=>{
    payload.push([
      grader.value,
      warehouse.value,
      society.value,
      date.value,
      r.name,
      r.reg,
      r.qty,
      r.f,
      r.o,
      r.d2,
      r.d4,
      r.d6,
      r.m,
      r.s,
      r.r,
      sign1.value,
      sign2.value
    ]);
  });

  fetch("https://script.google.com/macros/s/AKfycbxJpf3bJ6LVdgnC4omAk3bBmUp0Ns4BQcEFc60Pggy1m53cCqMt-ZMMY2DJT7gt5FKE/exec", {
    method:"POST",
    body:JSON.stringify(payload)
  })
  .then(res=>res.text())
  .then(msg=>{
    alert("✅ Data Saved to Google Sheet");
    console.log(msg);
  })
  .catch(err=>{
    alert("❌ Error saving data");
    console.error(err);
  });

}

</script>

</body>
</html>
