<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html" class="active">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader Name">
<input id="warehouse" placeholder="Warehouse">
<input id="society" placeholder="Society">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Moisture</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="addRow()">+ Add Row</button>

<br><br>

<button onclick="saveData()">Save</button>

</div>
</div>

<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:#fff; padding:20px; margin:100px auto; width:300px;">
    <h3>Edit</h3>
    <input id="eName">
    <input id="eReg">
    <input id="eQty">
    <input id="eM">
    <select id="eStatus">
      <option>FAQ</option>
      <option>Non-FAQ</option>
    </select>
    <br><br>
    <button onclick="updateRow()">Update</button>
    <button onclick="closePopup()">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>

let rowCount = 0;
let currentId = 0;
const API = "PASTE_YOUR_API_URL_HERE";

// ADD ROW
function addRow(){
  rowCount++;
  let row = `
  <tr id="row${rowCount}">
    <td>${rowCount}</td>
    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="m${rowCount}"></td>
    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>
    <td>
      <button onclick="openPopup(${rowCount})">Edit</button>
      <button onclick="deleteRow(${rowCount})">X</button>
    </td>
  </tr>`;
  tableBody.insertAdjacentHTML("beforeend", row);
}

// OPEN POPUP
function openPopup(id){
  currentId = id;

  eName.value = document.getElementById("name"+id).value;
  eReg.value = document.getElementById("reg"+id).value;
  eQty.value = document.getElementById("qty"+id).value;
  eM.value = document.getElementById("m"+id).value;
  eStatus.value = document.getElementById("s"+id).value;

  popup.style.display = "block";
}

// CLOSE POPUP
function closePopup(){
  popup.style.display = "none";
}

// UPDATE
async function updateRow(){

  let data = {
    action:"update",
    name:eName.value,
    reg:eReg.value,
    qty:eQty.value,
    m:eM.value,
    s:eStatus.value
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  document.getElementById("name"+currentId).value = eName.value;
  document.getElementById("reg"+currentId).value = eReg.value;
  document.getElementById("qty"+currentId).value = eQty.value;
  document.getElementById("m"+currentId).value = eM.value;
  document.getElementById("s"+currentId).value = eStatus.value;

  showToast("Updated ✅");
  closePopup();
}

// DELETE
async function deleteRow(id){

  let reg = document.getElementById("reg"+id).value;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"delete", reg})
  });

  document.getElementById("row"+id).remove();
  showToast("Deleted ❌");
}

// SAVE
async function saveData(){

  for(let i=1;i<=rowCount;i++){

    let name = document.getElementById("name"+i)?.value;

    if(name){
      let data = {
        action:"add",
        name,
        reg:document.getElementById("reg"+i).value,
        qty:document.getElementById("qty"+i).value,
        m:document.getElementById("m"+i).value,
        s:document.getElementById("s"+i).value
      };

      await fetch(API,{
        method:"POST",
        body:JSON.stringify(data)
      });
    }
  }

  showToast("Saved Successfully ✅");
}

// TOAST
function showToast(msg){

  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },3000);
}

// INIT
window.onload = ()=>{ for(let i=0;i<3;i++) addRow(); }

</script>

</body>
</html>
