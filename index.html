<!DOCTYPE html>
<html>
<head>
  <title>Survey Entry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; }
    .box { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px; }

    input, select { width:100%; padding:6px; margin:3px 0; }

    .table-container { overflow-x:auto; }

    table { width:100%; border-collapse: collapse; }
    th, td { border:1px solid black; font-size:12px; padding:5px; text-align:center; }
    th { background:#eee; font-size:11px; }

    .btn { padding:8px; border:none; color:#fff; cursor:pointer; margin-top:10px; }
    .add { background:#007bff; }
    .save { background:green; width:100%; }
    .del { background:red; }
  </style>
</head>

<body>

<div class="box">

<h2>Survey Entry Form</h2>

<input id="grader" placeholder="Grader/Surveyor Name">
<input id="warehouse" placeholder="Warehouse Name & Location">
<input id="society" placeholder="Society / Procurement Centre">
<input type="date" id="date">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN METTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<button class="btn add" onclick="addRow()">+ Add Row</button>

<input id="sign1" placeholder="Signature of Surveyor">
<input id="sign2" placeholder="Signature of Warehouse Manager">

<button class="btn save" onclick="saveData()">Save & Next</button>

</div>

<script>

let rowCount = 0;

function addRow() {

  rowCount++;
  const sr = document.querySelectorAll("#tableBody tr").length + 1;

  const row = `
  <tr id="row${rowCount}">
    <td class="sr">${sr}</td>

    <td><input id="name${rowCount}"></td>
    <td><input id="reg${rowCount}"></td>
    <td><input id="qty${rowCount}"></td>
    <td><input id="f${rowCount}"></td>
    <td><input id="o${rowCount}"></td>
    <td><input id="d2${rowCount}"></td>
    <td><input id="d4${rowCount}"></td>
    <td><input id="d6${rowCount}"></td>
    <td><input id="m${rowCount}"></td>

    <td>
      <select id="s${rowCount}">
        <option>FAQ</option>
        <option>Non-FAQ</option>
      </select>
    </td>

    <td><input id="r${rowCount}"></td>

    <td><button class="del" onclick="deleteRow(${rowCount})">X</button></td>
  </tr>`;
  
  tableBody.insertAdjacentHTML("beforeend", row);
  updateSr();
}

function deleteRow(id){
  document.getElementById("row"+id)?.remove();
  updateSr();
}

function updateSr(){
  document.querySelectorAll(".sr").forEach((el,i)=>el.innerText=i+1);
}

window.onload=()=>{ for(let i=0;i<5;i++) addRow(); }

function saveData(){

  let rows=[];

  for(let i=1;i<=rowCount;i++){
    let name=document.getElementById("name"+i)?.value;
    if(name){
      rows.push({
        name,
        reg:reg[i]?.value,
        qty:qty[i]?.value,
        f:f[i]?.value,
        o:o[i]?.value,
        d2:d2[i]?.value,
        d4:d4[i]?.value,
        d6:d6[i]?.value,
        m:m[i]?.value,
        s:s[i]?.value,
        r:r[i]?.value
      });
    }
  }

  const data={
    grader:grader.value,
    warehouse:warehouse.value,
    society:society.value,
    date:date.value,
    sign1:sign1.value,
    sign2:sign2.value,
    rows
  };

  localStorage.setItem("reportData",JSON.stringify(data));

  window.location.href="report.html";
}

</script>

</body>
</html>
