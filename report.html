<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>📄 Survey Report</h2>

<div id="info"></div>

<table border="1" id="reportTable">
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN MATTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>
</table>

<br>
<button onclick="exportExcel()">⬇ Export Excel</button>

<script src="config.js"></script>

<script>

let data=JSON.parse(localStorage.getItem("reportData"))||{rows:[]};
let currentIndex=0;

function load(){
  info.innerHTML=`
  <b>Grader:</b> ${data.grader||""} |
  <b>Warehouse:</b> ${data.warehouse||""} |
  <b>Society:</b> ${data.society||""} |
  <b>Date:</b> ${data.date||""}`;
  render();
}

function render(){

  let html="";

  data.rows.forEach((r,i)=>{
    html+=`
    <tr>
    <td>${i+1}</td>
    <td>${r.name}</td>
    <td>${r.reg}</td>
    <td>${r.qty}</td>
    <td>${r.foreign}</td>
    <td>${r.other}</td>
    <td>${r.damaged2}</td>
    <td>${r.slight}</td>
    <td>${r.damaged6}</td>
    <td>${r.moisture}</td>
    <td>${r.status}</td>
    <td>${r.remark}</td>
    <td><button onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.querySelector("#reportTable tbody").innerHTML=html;
}

function exportExcel(){

  let csv=[];
  document.querySelectorAll("#reportTable tr").forEach(row=>{
    let cols=row.querySelectorAll("th,td");
    let arr=[];
    cols.forEach(c=>arr.push(c.innerText));
    csv.push(arr.join(","));
  });

  let blob=new Blob([csv.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Survey_Report.csv";
  a.click();
}

window.onload=load;

</script>

</body>
</html>
