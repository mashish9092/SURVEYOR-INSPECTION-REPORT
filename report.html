<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">📄 Survey Report</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
  <a href="contact.html">📞 Contact</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<button class="btn save" onclick="exportExcel()">⬇ Export Excel</button>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportBody"></tbody>
</table>

</div>
</div>

<!-- 🔥 EDIT POPUP -->
<div id="popup">
  <div class="popup-box">

    <h3>Edit Record</h3>

    <input id="e_name" placeholder="Name">
    <input id="e_reg" placeholder="Registration">
    <input id="e_qty" type="number" placeholder="Qty">
    <input id="e_foreign" type="number" placeholder="Foreign">
    <input id="e_other" type="number" placeholder="Other">
    <input id="e_damaged2" type="number" placeholder="Damaged">
    <input id="e_slight" type="number" placeholder="Slight">
    <input id="e_damaged6" type="number" placeholder="6%">
    <input id="e_moisture" type="number" placeholder="Moisture">

    <select id="e_status">
      <option>FAQ</option>
      <option>Non-FAQ</option>
    </select>

    <input id="e_remark" placeholder="Remark">

    <br><br>

    <button class="btn save" onclick="saveEdit()">💾 Update</button>
    <button class="btn cancel" onclick="closePopup()">❌ Cancel</button>

  </div>
</div>

<div class="footer">
© <span id="year"></span> Survey System | Developed by Ashish Mehra
</div>

<script src="config.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("currentReport")) || [];
let currentIndex = null;

// 🔥 RENDER
function render(){

  let html = "";

  data.forEach((r,i)=>{

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.reg}</td>
      <td>${r.qty}</td>
      <td>${r.foreign}</td>
      <td>${r.other}</td>
      <td>${r.damaged2}</td>
      <td>${r.slight}</td>
      <td>${r.damaged6}</td>
      <td>${r.moisture}</td>
      <td>${r.status}</td>
      <td>${r.remark}</td>
      <td><button class="btn edit" onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.getElementById("reportBody").innerHTML = html;
}

// 🔥 OPEN EDIT
function editRow(i){

  currentIndex = i;
  let r = data[i];

  e_name.value = r.name;
  e_reg.value = r.reg;
  e_qty.value = r.qty;
  e_foreign.value = r.foreign;
  e_other.value = r.other;
  e_damaged2.value = r.damaged2;
  e_slight.value = r.slight;
  e_damaged6.value = r.damaged6;
  e_moisture.value = r.moisture;
  e_status.value = r.status;
  e_remark.value = r.remark;

  popup.style.display = "flex";
}

// 🔥 SAVE EDIT
function saveEdit(){

  let r = data[currentIndex];

  r.name = e_name.value;
  r.reg = e_reg.value;
  r.qty = e_qty.value;
  r.foreign = e_foreign.value;
  r.other = e_other.value;
  r.damaged2 = e_damaged2.value;
  r.slight = e_slight.value;
  r.damaged6 = e_damaged6.value;
  r.moisture = e_moisture.value;
  r.status = e_status.value;
  r.remark = e_remark.value;

  // 🔥 UPDATE SHEET
  fetch(API_MAIN,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      action:"update",
      ...r
    })
  });

  // 🔥 UPDATE LOCAL
  localStorage.setItem("currentReport", JSON.stringify(data));

  closePopup();
  render();

  alert("Updated Successfully ✅");
}

// CLOSE
function closePopup(){
  popup.style.display = "none";
}

// 🔥 EXPORT
function exportExcel(){

  let arr = [];

  arr.push([
    "Sr.No","Name","Registration","Qty","Foreign","Other",
    "Damaged","Slight","6%","Moisture","Status","Remark"
  ]);

  data.forEach((r,i)=>{
    arr.push([
      i+1,
      r.name,
      r.reg,
      r.qty,
      r.foreign,
      r.other,
      r.damaged2,
      r.slight,
      r.damaged6,
      r.moisture,
      r.status,
      r.remark
    ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(arr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Current_Report.xlsx");

  localStorage.removeItem("currentReport");

  alert("Export done ✅ Table cleared");

  location.reload();
}

// INIT
window.onload = render;
document.getElementById("year").innerText = new Date().getFullYear();

</script>

</body>
</html>
