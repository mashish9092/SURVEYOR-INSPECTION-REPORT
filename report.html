<!DOCTYPE html>
<html>
<head>
<title>Report</title>

<style>
body{font-family:Arial;padding:20px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid black;padding:6px;font-size:12px;}
th{background:#eee;}
button{padding:10px;margin-top:10px;}
</style>
</head>

<body>

<h2>Survey Report</h2>

<div id="report"></div>

<button onclick="exportExcel()">Export Excel</button>
<button onclick="goBack()">Edit</button>

<script>

let data = JSON.parse(localStorage.getItem("reportData"));

render();

function render(){

let html = `
<p><b>Grader:</b> ${data.grader}</p>
<p><b>Warehouse:</b> ${data.warehouse}</p>
<p><b>Society:</b> ${data.society}</p>
<p><b>Date:</b> ${data.date}</p>

<table>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN METTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
</tr>
`;

data.rows.forEach((r,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${r.name}</td>
<td>${r.reg}</td>
<td>${r.qty}</td>
<td>${r.f}</td>
<td>${r.o}</td>
<td>${r.d2}</td>
<td>${r.d4}</td>
<td>${r.d6}</td>
<td>${r.m}</td>
<td>${r.s}</td>
<td>${r.r}</td>
</tr>`;
});

html+=`</table>`;

document.getElementById("report").innerHTML=html;
}

function exportExcel(){

let csv=[];

csv.push([
"Grader","Warehouse","Society","Date",
"Name Of Farmer/Society","Farmer Registration","Qty In Quintals (Approx)",
"FOREIGN METTER (0.75%)","OTHER FOOD GRAINS (2%)","DAMAGED GRAINS (2%)",
"SLIGHT DAMAGED GRAINS (4%)","DAMAGED GRAINS (6%)","MOISTURE (12%)",
"Status FAQ/Non FAQ","Remark If Any"
].join(","));

data.rows.forEach(r=>{
csv.push([
data.grader,data.warehouse,data.society,data.date,
r.name,r.reg,r.qty,r.f,r.o,r.d2,r.d4,r.d6,r.m,r.s,r.r
].join(","));
});

let blob=new Blob([csv.join("\n")],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="Survey_Report.csv";
link.click();
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
