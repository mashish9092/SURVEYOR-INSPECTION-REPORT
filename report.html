<script src="config.js"></script>

<script>

let currentData = [];
let currentIndex = 0;

// 🔥 LOAD FROM GOOGLE SHEET
async function load(){

  try{
    const res = await fetch(API_MAIN);
    const data = await res.json();

    console.log("Sheet Data:", data);

    currentData = data;

    render();

  }catch(err){
    console.error("Error loading data:", err);
  }
}

// 🔥 RENDER TABLE
function render(){

  let html = "";

  currentData.forEach((r,i)=>{

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.Name || ""}</td>
      <td>${r.Registration || ""}</td>
      <td>${r.Qty || ""}</td>
      <td>${r.Foreign || ""}</td>
      <td>${r.Other || ""}</td>
      <td>${r.Damaged || ""}</td>
      <td>${r.Slight || ""}</td>
      <td>${r["6%"] || ""}</td>
      <td>${r.Moisture || ""}</td>
      <td>${r.Status || ""}</td>
      <td>${r.Remark || ""}</td>
      <td><button class="btn edit" onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.querySelector("#reportTable tbody").innerHTML = html;
}

// 🔥 EDIT
function editRow(i){

  currentIndex = i;
  let r = currentData[i];

  eName.value = r.Name;
  eReg.value = r.Registration;
  eQty.value = r.Qty;
  eForeign.value = r.Foreign;
  eOther.value = r.Other;
  eDamaged2.value = r.Damaged;
  eSlight.value = r.Slight;
  eDamaged6.value = r["6%"];
  eMoisture.value = r.Moisture;
  eStatus.value = r.Status;
  eRemark.value = r.Remark;

  popup.style.display = "flex";
}

// 🔥 UPDATE (GOOGLE SHEET)
async function updateRow(){

  let r = currentData[currentIndex];

  let updated = {
    name: eName.value,
    reg: eReg.value,
    qty: eQty.value,
    foreign: eForeign.value,
    other: eOther.value,
    damaged2: eDamaged2.value,
    slight: eSlight.value,
    damaged6: eDamaged6.value,
    moisture: eMoisture.value,
    status: eStatus.value,
    remark: eRemark.value
  };

  try{

    await fetch(API_MAIN,{
      method:"POST",
      body:JSON.stringify({
        action:"update",
        ...updated
      })
    });

    alert("Updated successfully");

    closePopup();
    load(); // 🔥 reload fresh data

  }catch(e){
    alert("Update failed");
  }
}

// CLOSE
function closePopup(){
  popup.style.display = "none";
}

// 🔥 EXPORT FROM SHEET DATA
function exportExcel(){

  let dataArr = [];

  let headers = [
    "Sr.No","Name","Registration","Qty","Foreign","Other",
    "Damaged","Slight","6%","Moisture","Status","Remark"
  ];

  dataArr.push(headers);

  currentData.forEach((r,i)=>{

    dataArr.push([
      i+1,
      r.Name,
      r.Registration,
      r.Qty,
      r.Foreign,
      r.Other,
      r.Damaged,
      r.Slight,
      r["6%"],
      r.Moisture,
      r.Status,
      r.Remark
    ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(dataArr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Survey_Report.xlsx");
}

// DATE TIME
function updateDateTime(){
  let now = new Date();
  document.getElementById("dateTime").innerText =
    now.toLocaleDateString('en-IN') + " | " + now.toLocaleTimeString();
}

// INIT
window.onload = function(){
  load(); // 🔥 IMPORTANT
  updateDateTime();
  setInterval(updateDateTime,1000);
  document.getElementById("year").innerText = new Date().getFullYear();
};

</script>
