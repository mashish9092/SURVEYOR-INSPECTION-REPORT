<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<div id="info" style="margin-bottom:15px;"></div>

<div class="table-container">
<table id="reportTable">
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>D2</th>
<th>D4</th>
<th>D6</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>
</table>
</div>

<br>

<button class="btn excel" onclick="exportExcel()">⬇ Export Excel</button>

</div>
</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0005;">
<div style="background:#fff;padding:20px;margin:50px auto;width:350px;max-height:80vh;overflow:auto;border-radius:8px;">

<h3>Edit Row</h3>

<label>Name</label>
<input id="eName">

<label>Registration</label>
<input id="eReg">

<label>Qty</label>
<input id="eQty">

<label>Foreign</label>
<input id="eForeign">

<label>Other</label>
<input id="eOther">

<label>Damaged (2%)</label>
<input id="eD2">

<label>Slight (4%)</label>
<input id="eD4">

<label>Damaged (6%)</label>
<input id="eD6">

<label>Moisture</label>
<input id="eM">

<label>Status</label>
<select id="eStatus">
  <option>FAQ</option>
  <option>Non-FAQ</option>
</select>

<label>Remark</label>
<input id="eRemark">

<br><br>

<button class="btn save" onclick="updateRow()">Update</button>
<button class="btn cancel" onclick="closePopup()">Cancel</button>

</div>
</div>

<!-- ✅ CONFIG -->
<script src="config.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("reportData")) || {rows:[]};
let currentIndex = 0;

// LOAD
function load(){

  info.innerHTML = `
  <b>Grader:</b> ${data.grader || ""} |
  <b>Warehouse:</b> ${data.warehouse || ""} |
  <b>Society:</b> ${data.society || ""} |
  <b>Date:</b> ${data.date || ""}`;

  render();
}

// RENDER TABLE
function render(){

  let html="";

  data.rows.forEach((r,i)=>{

    html+=`
    <tr>
    <td>${i+1}</td>
    <td>${r.name}</td>
    <td>${r.reg}</td>
    <td>${r.qty}</td>
    <td>${r.f}</td>
    <td>${r.o}</td>
    <td>${r.d2}</td>
    <td>${r.d4}</td>
    <td>${r.d6}</td>
    <td>${r.m}</td>
    <td>${r.s}</td>
    <td>${r.r}</td>
    <td><button class="btn edit" onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.querySelector("#reportTable tbody").innerHTML = html;
}

// OPEN EDIT
function editRow(i){

  currentIndex = i;
  let r = data.rows[i];

  eName.value=r.name;
  eReg.value=r.reg;
  eQty.value=r.qty;
  eForeign.value=r.f;
  eOther.value=r.o;
  eD2.value=r.d2;
  eD4.value=r.d4;
  eD6.value=r.d6;
  eM.value=r.m;
  eStatus.value=r.s;
  eRemark.value=r.r;

  popup.style.display="block";
}

// CLOSE
function closePopup(){
  popup.style.display="none";
}

// UPDATE
async function updateRow(){

  let r = data.rows[currentIndex];

  r.name=eName.value;
  r.reg=eReg.value;
  r.qty=eQty.value;
  r.f=eForeign.value;
  r.o=eOther.value;
  r.d2=eD2.value;
  r.d4=eD4.value;
  r.d6=eD6.value;
  r.m=eM.value;
  r.s=eStatus.value;
  r.r=eRemark.value;

  localStorage.setItem("reportData",JSON.stringify(data));

  render();
  closePopup();

  // 🔥 GOOGLE SHEET UPDATE
  if(typeof API !== "undefined"){
    try{
      await fetch(API,{
        method:"POST",
        body:JSON.stringify({
          action:"update",
          ...r
        })
      });
      console.log("Updated in Sheet ✅");
    }catch(e){
      console.log("Sheet Error ❌",e);
    }
  }
}

// EXPORT
function exportExcel(){

  let csv=[];

  document.querySelectorAll("#reportTable tr").forEach(row=>{
    let cols=row.querySelectorAll("th,td");
    let arr=[];
    cols.forEach(c=>arr.push(c.innerText));
    csv.push(arr.join(","));
  });

  let blob=new Blob([csv.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Survey_Report.csv";
  a.click();
}

window.onload=load;

</script>

</body>
</html>
