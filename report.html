<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">📄 Survey Report</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<button class="btn save" onclick="exportExcel()">⬇ Export Excel</button>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportBody"></tbody>
</table>

</div>
</div>

<!-- EDIT POPUP -->
<div id="popup" style="display:none;">
  <div class="popup-box">

    <h3>Edit Record</h3>

    <input id="e_name" placeholder="Name">
    <input id="e_reg" placeholder="Registration">
    <input id="e_qty" type="number" placeholder="Qty">
    <input id="e_foreign" type="number" placeholder="Foreign">
    <input id="e_other" type="number" placeholder="Other">
    <input id="e_damaged2" type="number" placeholder="Damaged">
    <input id="e_slight" type="number" placeholder="Slight">
    <input id="e_damaged6" type="number" placeholder="6%">
    <input id="e_moisture" type="number" placeholder="Moisture">

    <select id="e_status">
      <option>FAQ</option>
      <option>Non-FAQ</option>
    </select>

    <input id="e_remark" placeholder="Remark">

    <br><br>

    <button onclick="saveEdit()">Update</button>
    <button onclick="closePopup()">Cancel</button>

  </div>
</div>

<script src="config.js"></script>

<script>

let data = JSON.parse(localStorage.getItem("currentReport")) || [];
let currentIndex = null;

// RENDER TABLE
function render(){

  let html = "";

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.name || ""}</td>
      <td>${r.reg || ""}</td>
      <td>${r.qty || ""}</td>
      <td>${r.foreign || ""}</td>
      <td>${r.other || ""}</td>
      <td>${r.damaged2 || ""}</td>
      <td>${r.slight || ""}</td>
      <td>${r.damaged6 || ""}</td>
      <td>${r.moisture || ""}</td>
      <td>${r.status || ""}</td>
      <td>${r.remark || ""}</td>
      <td>
        <button onclick="editRow(${i})">Edit</button>
      </td>
    </tr>`;
  });

  document.getElementById("reportBody").innerHTML = html;
}

// EDIT
function editRow(i){
  currentIndex = i;

  let r = data[i];

  let updated = {
    id: r.id, // 🔥 IMPORTANT
    name: prompt("Name", r.name),
    reg: prompt("Registration", r.reg),
    qty: prompt("Qty", r.qty),
    foreign: r.foreign,
    other: r.other,
    damaged2: r.damaged2,
    slight: r.slight,
    damaged6: r.damaged6,
    moisture: r.moisture,
    status: r.status,
    remark: r.remark
  };

  updateRow(updated);
}

// UPDATE API
async function updateRow(updated){

  try{

    const res = await fetch(API_MAIN,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        action:"update",
        ...updated
      })
    });
    const text = await res.text();
    console.log("API:", text);

    alert("Updated Successfully ✅");

  }catch(err){
    console.error(err);
    alert("Update Failed ❌");
  }
}

// EXPORT
function exportExcel(){

  let arr = [];

  arr.push([
    "Sr.No","Name","Registration","Qty","Foreign","Other",
    "Damaged","Slight","6%","Moisture","Status","Remark"
  ]);

  data.forEach((r,i)=>{
    arr.push([
      i+1,
      r.name,
      r.reg,
      r.qty,
      r.foreign,
      r.other,
      r.damaged2,
      r.slight,
      r.damaged6,
      r.moisture,
      r.status,
      r.remark
    ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(arr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Report.xlsx");
}

// INIT
window.onload = render;

</script>
  
</body>
</html>
