<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Survey System</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<div id="info"></div>

<div class="table-container">
<table id="reportTable">
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Reg</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>D2</th>
<th>D4</th>
<th>D6</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<br>

<button onclick="exportExcel()">⬇ Export Excel</button>

</div>
</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0005;">
<div style="background:#fff;padding:20px;margin:80px auto;width:300px;max-height:80vh;overflow:auto;">

<h3>Edit</h3>

<input id="eName"><input id="eReg"><input id="eQty">
<input id="eForeign"><input id="eOther">
<input id="eD2"><input id="eD4"><input id="eD6">
<input id="eM">
<select id="eStatus"><option>FAQ</option><option>Non-FAQ</option></select>
<input id="eRemark">

<br><br>
<button onclick="updateRow()">Update</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<script>

const API = "PASTE_YOUR_GOOGLE_SCRIPT_URL";

let data = JSON.parse(localStorage.getItem("reportData"));
let currentIndex = 0;

function load(){

  info.innerHTML = `
  <p><b>Grader:</b> ${data.grader}</p>
  <p><b>Warehouse:</b> ${data.warehouse}</p>
  <p><b>Society:</b> ${data.society}</p>
  <p><b>Date:</b> ${data.date}</p>`;

  render();
}

function render(){

  let html="";

  data.rows.forEach((r,i)=>{

    html+=`
    <tr>
    <td>${i+1}</td>
    <td>${r.name}</td>
    <td>${r.reg}</td>
    <td>${r.qty}</td>
    <td>${r.foreign}</td>
    <td>${r.other}</td>
    <td>${r.damaged2}</td>
    <td>${r.slight}</td>
    <td>${r.damaged6}</td>
    <td>${r.moisture}</td>
    <td>${r.status}</td>
    <td>${r.remark}</td>
    <td><button onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  document.querySelector("#reportTable tbody").innerHTML = html;
}

function editRow(i){

  currentIndex = i;
  let r = data.rows[i];

  eName.value=r.name;
  eReg.value=r.reg;
  eQty.value=r.qty;
  eForeign.value=r.foreign;
  eOther.value=r.other;
  eD2.value=r.damaged2;
  eD4.value=r.slight;
  eD6.value=r.damaged6;
  eM.value=r.moisture;
  eStatus.value=r.status;
  eRemark.value=r.remark;

  popup.style.display="block";
}

function closePopup(){
  popup.style.display="none";
}

async function updateRow(){

  let r = data.rows[currentIndex];

  r.name=eName.value;
  r.reg=eReg.value;
  r.qty=eQty.value;
  r.foreign=eForeign.value;
  r.other=eOther.value;
  r.damaged2=eD2.value;
  r.slight=eD4.value;
  r.damaged6=eD6.value;
  r.moisture=eM.value;
  r.status=eStatus.value;
  r.remark=eRemark.value;

  localStorage.setItem("reportData",JSON.stringify(data));

  render();
  closePopup();

  // GOOGLE SHEET
  if(API !== "PASTE_YOUR_GOOGLE_SCRIPT_URL"){
    await fetch(API,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({
        action:"update",
        ...r
      })
    });
  }
}

function exportExcel(){

  let csv=[];
  document.querySelectorAll("#reportTable tr").forEach(row=>{
    let cols=row.querySelectorAll("th,td");
    let arr=[];
    cols.forEach(c=>arr.push(c.innerText));
    csv.push(arr.join(","));
  });

  let blob=new Blob([csv.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="report.csv";
  a.click();
}

window.onload=load;

</script>

</body>
</html>
