<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">📄 Survey Report</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
  <a href="contact.html">📞 Contact</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<button class="btn save" onclick="exportExcel()">⬇ Export Excel</button>

<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name</th>
<th>Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged</th>
<th>Slight</th>
<th>6%</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportBody"></tbody>
</table>

</div>
</div>

<div class="footer">
© <span id="year"></span> Survey System | Developed by Ashish Mehra
</div>

<script src="config.js"></script>

<script>

// 🔥 CURRENT DATA ONLY
let data = JSON.parse(localStorage.getItem("currentReport")) || [];

// 🔥 RENDER
function render(){

  let body = document.getElementById("reportBody");

  if(!body) return;

  let html = "";

  data.forEach((r,i)=>{

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.reg}</td>
      <td>${r.qty}</td>
      <td>${r.foreign}</td>
      <td>${r.other}</td>
      <td>${r.damaged2}</td>
      <td>${r.slight}</td>
      <td>${r.damaged6}</td>
      <td>${r.moisture}</td>
      <td>${r.status}</td>
      <td>${r.remark}</td>
      <td><button onclick="editRow(${i})">Edit</button></td>
    </tr>`;
  });

  body.innerHTML = html;
}

// 🔥 EDIT + UPDATE
function editRow(i){

  let r = data[i];

  r.name = prompt("Name", r.name) || r.name;
  r.qty = prompt("Qty", r.qty) || r.qty;

  // 🔥 UPDATE SHEET
  fetch(API_MAIN,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      action:"update",
      ...r
    })
  });

  // 🔥 UPDATE LOCAL
  localStorage.setItem("currentReport", JSON.stringify(data));

  render();
}

// 🔥 EXPORT CURRENT DATA ONLY
function exportExcel(){

  let arr = [];

  arr.push([
    "Sr.No","Name","Registration","Qty","Foreign","Other",
    "Damaged","Slight","6%","Moisture","Status","Remark"
  ]);

  data.forEach((r,i)=>{
    arr.push([
      i+1,
      r.name,
      r.reg,
      r.qty,
      r.foreign,
      r.other,
      r.damaged2,
      r.slight,
      r.damaged6,
      r.moisture,
      r.status,
      r.remark
    ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(arr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Current_Report.xlsx");

  // 🔥 CLEAR DATA AFTER EXPORT
  localStorage.removeItem("currentReport");

  alert("Export done ✅ Table cleared");

  location.reload();
}

// INIT
window.onload = render;

document.getElementById("year").innerText = new Date().getFullYear();

</script>

</body>
</html>
