<!DOCTYPE html>
<html>
<head>
  <title>Survey Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Excel Export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">📄 Survey Report</div>

<div class="sidebar">
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html" class="active">📄 Report</a>
  <a href="contact.html">📞 Contact</a>
</div>

<div class="main">
<div class="box">

<h2>📄 Survey Report</h2>

<div id="info"></div>

<button class="btn save" onclick="exportExcel()">⬇ Export Excel</button>

<table id="reportTable">
  <thead>
    <tr>
      <th>Sr.No</th>
      <th>Name</th>
      <th>Registration</th>
      <th>Qty</th>
      <th>Foreign</th>
      <th>Other</th>
      <th>Damaged</th>
      <th>Slight</th>
      <th>6%</th>
      <th>Moisture</th>
      <th>Status</th>
      <th>Remark</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="reportBody"></tbody>
</table>

</div>
</div>

<div class="footer">
© <span id="year"></span> Survey System | Developed by Ashish Mehra
</div>

<!-- CONFIG -->
<script src="config.js"></script>

<script>

let currentData = [];
let currentIndex = 0;

// 🔥 LOAD DATA FROM GOOGLE SHEET
async function load(){

  try{
    const res = await fetch(API_MAIN);
    const data = await res.json();

    console.log("Sheet Data:", data);

    currentData = data;

    render();

  }catch(err){
    console.error("Load Error:", err);
  }
}

// 🔥 RENDER TABLE
function render(){

  let body = document.getElementById("reportBody");

  if(!body){
    console.error("Table body missing");
    return;
  }

  let html = "";

  currentData.forEach((r,i)=>{

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.Name || ""}</td>
      <td>${r.Registration || ""}</td>
      <td>${r.Qty || ""}</td>
      <td>${r.Foreign || ""}</td>
      <td>${r.Other || ""}</td>
      <td>${r.Damaged || ""}</td>
      <td>${r.Slight || ""}</td>
      <td>${r["6%"] || ""}</td>
      <td>${r.Moisture || ""}</td>
      <td>${r.Status || ""}</td>
      <td>${r.Remark || ""}</td>
      <td>
        <button class="btn add" onclick="editRow(${i})">Edit</button>
      </td>
    </tr>`;
  });

  body.innerHTML = html;
}

// 🔥 EDIT
function editRow(i){

  currentIndex = i;

  let r = currentData[i];

  let name = prompt("Name", r.Name);
  let reg = prompt("Registration", r.Registration);
  let qty = prompt("Qty", r.Qty);

  if(name === null) return;

  updateRow({
    name, reg, qty,
    foreign:r.Foreign,
    other:r.Other,
    damaged2:r.Damaged,
    slight:r.Slight,
    damaged6:r["6%"],
    moisture:r.Moisture,
    status:r.Status,
    remark:r.Remark
  });
}

// 🔥 UPDATE GOOGLE SHEET
async function updateRow(data){

  try{

    await fetch(API_MAIN,{
      method:"POST",
      body:JSON.stringify({
        action:"update",
        ...data
      })
    });

    alert("Updated Successfully");

    load();

  }catch(e){
    alert("Update failed");
  }
}

// 🔥 EXPORT EXCEL
function exportExcel(){

  let arr = [];

  let headers = [
    "Sr.No","Name","Registration","Qty","Foreign","Other",
    "Damaged","Slight","6%","Moisture","Status","Remark"
  ];

  arr.push(headers);

  currentData.forEach((r,i)=>{
    arr.push([
      i+1,
      r.Name,
      r.Registration,
      r.Qty,
      r.Foreign,
      r.Other,
      r.Damaged,
      r.Slight,
      r["6%"],
      r.Moisture,
      r.Status,
      r.Remark
    ]);
  });

  let ws = XLSX.utils.aoa_to_sheet(arr);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");

  XLSX.writeFile(wb, "Survey_Report.xlsx");
}

// YEAR
document.getElementById("year").innerText = new Date().getFullYear();

// INIT
window.onload = load;

</script>

</body>
</html>
