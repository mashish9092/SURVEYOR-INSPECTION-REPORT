<!DOCTYPE html>
<html>
<head>
  <title>Surveyor Inspection Report</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h2, h3 {
      text-align: center;
      margin: 5px;
    }

    .info {
      margin: 10px 0;
    }

    .info input {
      width: 300px;
      margin: 5px;
      padding: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    table, th, td {
      border: 1px solid black;
    }

    th, td {
      padding: 5px;
      text-align: center;
      font-size: 12px;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media print {
      button {
        display: none;
      }
    }
  </style>
</head>

<body>

<h2>R B ASSOCIATES GLOBAL CONNECT PVT LTD</h2>
<h3>SURVEYOR INSPECTION REPORT</h3>

<div class="info">
  District: <input id="district">
  Date: <input id="date" type="date"><br>

  Commodity: <input value="WHEAT" readonly>
  Warehouse: <input id="warehouse"><br>

  Society: <input id="society">
  Surveyor Name: <input id="surveyor"><br>
</div>

<table>
  <tr>
    <th>Sr No</th>
    <th>Name</th>
    <th>Registration</th>
    <th>Qty</th>
    <th>Foreign</th>
    <th>Other</th>
    <th>Damaged 2%</th>
    <th>Slight 4%</th>
    <th>Damaged 6%</th>
    <th>Moisture</th>
    <th>Status</th>
    <th>Remark</th>
  </tr>

  <tr>
    <td><input id="sr_no"></td>
    <td><input id="name"></td>
    <td><input id="reg"></td>
    <td><input id="qty"></td>
    <td><input id="foreign"></td>
    <td><input id="other"></td>
    <td><input id="d2"></td>
    <td><input id="d4"></td>
    <td><input id="d6"></td>
    <td><input id="moisture"></td>
    <td><input id="status"></td>
    <td><input id="remark"></td>
  </tr>
</table>

<button onclick="saveData()">Save</button>
<button onclick="window.print()">Print</button>

<script>
function saveData() {

  const url = "https://script.google.com/macros/s/AKfycbze1dASGrpGt8VYXvfCU8AE6S8royeqBHBUTswXbU0Aq3qpOgDEqPC-SySn7FavByQm/exec";

  const data = {
    sr_no: document.getElementById("sr_no").value,
    name: document.getElementById("name").value,
    registration: document.getElementById("reg").value,
    qty: document.getElementById("qty").value,
    foreign: document.getElementById("foreign").value,
    other: document.getElementById("other").value,
    damage2: document.getElementById("d2").value,
    slight4: document.getElementById("d4").value,
    damage6: document.getElementById("d6").value,
    moisture: document.getElementById("moisture").value,
    status: document.getElementById("status").value,
    remark: document.getElementById("remark").value
  };

  fetch(url, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => alert("Saved to Sheet"))
  .catch(() => alert("Error"));
}
</script>

</body>
</html>
