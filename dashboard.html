<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- ✅ Excel Export Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;}
.main{width:95%;max-width:1200px;margin:auto;}

.table-container{
  overflow-x:auto;
  background:white;
  padding:15px;
  border-radius:10px;
}

table{width:100%;border-collapse:collapse;}
th{background:#2f6ecb;color:white;padding:10px;}
td{padding:8px;border:1px solid #ddd;text-align:center;}

button{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin:3px;
}

.back{background:#4caf50;color:white;}
.print{background:#28a745;color:white;}
.export{background:#2196f3;color:white;}

input{
  padding:8px;
  width:250px;
  margin:10px 0;
}

  tr:hover{
  background:#eef5ff;
}

th{
  position: sticky;
  top: 0;
  z-index: 2;
}

.pagination button{
  background:#ddd;
}
  .footer{
  text-align:center;
  margin-top:30px;
  padding:15px;
  background:#2f6ecb;
  color:white;
  border-radius:8px;
}
  
</style>
</head>

<body>

<div class="main">

<h2>📊 Dashboard</h2>

<button class="back" onclick="goBack()">⬅ Back</button>
<button class="export" onclick="exportExcel()">📥 Export Excel</button>

<br>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="filterData()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged (2%)</th>
<th>Slight (4%)</th>
<th>Damaged (6%)</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Print</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>
</div>

<br>

<div class="pagination" id="pagination"></div>

</div>
  <!-- 👇FOOTER-->
<div class="footer">
  © 2026 R B ASSOCIATES GLOBAL CONNECT PVT LTD  
  <br>
  Developed by Ashish Mehra
</div>

<script src="config.js"></script>

<script>

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;

// ==============================
// 🔵 LOAD DATA
// ==============================
function loadData(){

  try{

    // 👇 Loading show
    document.getElementById("dataBody").innerHTML =
      "<tr><td colspan='13'>Loading...</td></tr>";

    let script = document.createElement("script");

    // 🔥 JSONP call
    script.src = API_MAIN + "?callback=handleData";

    document.body.appendChild(script);

  }catch(err){
    console.error(err);
    alert("Dashboard Load Failed ❌");
  }
}


// 🔥 CALLBACK FUNCTION (IMPORTANT)
function handleData(data){

  console.log("DATA:", data);

  if(!Array.isArray(data) || data.length === 0){
    document.getElementById("dataBody").innerHTML =
      "<tr><td colspan='13'>No Data Found ❌</td></tr>";
    return;
  }

  allData = data;
  filteredData = [...allData].reverse();

  renderTable();
}
// ==============================
// 🔵 RENDER TABLE
// ==============================
function renderTable(){

  let start = (currentPage-1) * rowsPerPage;
  let end = start + rowsPerPage;

  let pageData = filteredData.slice(start,end);

  let html = "";

  pageData.forEach((r,i)=>{

   html += `
<tr>
  <td>${start + i + 1}</td>
  <td>${r["Name Of Farmer/Society"] ?? r.name ?? ""}</td>
  <td>${r["Farmer Registration"] ?? r.reg ?? ""}</td>
  <td>${r["Qty In Quintals (Approx)"] ?? r.qty ?? ""}</td>
  <td>${r["FOREIGN MATTER (0.75%)"] ?? r.foreign ?? ""}</td>
  <td>${r["OTHER FOOD GRAINS (2%)"] ?? r.other ?? ""}</td>
  <td>${r["DAMAGED GRAINS (2%)"] ?? r.damaged2 ?? ""}</td>
  <td>${r["SLIGHT DAMAGED GRAINS (4%)"] ?? r.slight ?? ""}</td>
  <td>${r["DAMAGED GRAINS (6%)"] ?? r.damaged6 ?? ""}</td>
  <td>${r["MOISTURE (12%)"] ?? r.moisture ?? ""}</td>
  <td>${r["Status FAQ/Non FAQ"] ?? r.status ?? ""}</td>
  <td>${r["Remark If Any"] ?? r.remark ?? ""}</td>
  <td>
    <button class="print" onclick='printRow(${JSON.stringify(r)})'>Print</button>
  </td>
</tr>`;
  });

  document.getElementById("dataBody").innerHTML = html;

  renderPagination();
}

// ==============================
// 🔍 SEARCH
// ==============================
function filterData(){

  let val = document.getElementById("search").value.toLowerCase();

  filteredData = allData.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(val)
  );

  currentPage = 1;
  renderTable();
}

// ==============================
// 📄 PAGINATION
// ==============================
function renderPagination(){

  let totalPages = Math.ceil(filteredData.length / rowsPerPage);
  let html = "";

  for(let i=1;i<=totalPages;i++){
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function goPage(page){
  currentPage = page;
  renderTable();
}

// ==============================
// 📥 EXPORT EXCEL
// ==============================
function exportExcel(){

  if(allData.length === 0){
    alert("No data found ❌");
    return;
  }

  let excelData = allData.map((r,i)=>({
    "Sr.No": i+1,
    "Name Of Farmer/Society": r["Name Of Farmer/Society"],
    "Farmer Registration": r["Farmer Registration"],
    "Qty In Quintals (Approx)": r["Qty In Quintals (Approx)"],
    "FOREIGN MATTER (0.75%)": r["FOREIGN MATTER (0.75%)"],
    "OTHER FOOD GRAINS (2%)": r["OTHER FOOD GRAINS (2%)"],
    "DAMAGED GRAINS (2%)": r["DAMAGED GRAINS (2%)"],
    "SLIGHT DAMAGED GRAINS (4%)": r["SLIGHT DAMAGED GRAINS (4%)"],
    "DAMAGED GRAINS (6%)": r["DAMAGED GRAINS (6%)"],
    "MOISTURE (12%)": r["MOISTURE (12%)"],
    "Status FAQ/Non FAQ": r["Status FAQ/Non FAQ"],
    "Remark If Any": r["Remark If Any"]
  }));

  let ws = XLSX.utils.json_to_sheet(excelData);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Survey Data");

  XLSX.writeFile(wb, "Survey_Report.xlsx");
}

// ==============================
// 🖨 PRINT (FORMAT)
// ==============================
function printRow(data){

  let win = window.open('', '', 'width=1200,height=800');

  win.document.write(`
  <html>
  <head>
  <style>
    body{font-family:Arial;margin:10px;}
    .box{border:2px solid black;padding:10px;}
    .header{text-align:center;font-weight:bold;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th,td{border:1px solid black;padding:6px;text-align:center;}
    .sign{margin-top:30px;display:flex;justify-content:space-between;}
  </style>
  </head>

  <body>

  <div class="box">

    <div class="header">
      <h3>R B ASSOCIATES GLOBAL CONNECT PVT LTD</h3>
      <div>SURVEYOR INSPECTION REPORT</div>
      <div>(District Narsinghpur)</div>
      <div>For Procurement Centre</div>
    </div>

    <br>

    <b>COMMODITY : WHEAT</b>

    <table>
      <tr>
        <th>Sr.No</th>
        <th>Name</th>
        <th>Reg</th>
        <th>Qty</th>
        <th>Foreign</th>
        <th>Other</th>
        <th>Damaged</th>
        <th>Slight</th>
        <th>Damaged</th>
        <th>Moisture</th>
        <th>Status</th>
        <th>Remark</th>
      </tr>

      <tr>
        <td>1</td>
        <td>${data["Name Of Farmer/Society"]}</td>
        <td>${data["Farmer Registration"]}</td>
        <td>${data["Qty In Quintals (Approx)"]}</td>
        <td>${data["FOREIGN MATTER (0.75%)"]}</td>
        <td>${data["OTHER FOOD GRAINS (2%)"]}</td>
        <td>${data["DAMAGED GRAINS (2%)"]}</td>
        <td>${data["SLIGHT DAMAGED GRAINS (4%)"]}</td>
        <td>${data["DAMAGED GRAINS (6%)"]}</td>
        <td>${data["MOISTURE (12%)"]}</td>
        <td>${data["Status FAQ/Non FAQ"]}</td>
        <td>${data["Remark If Any"]}</td>
      </tr>
    </table>

    <div class="sign">
      <div>Surveyor Sign: __________</div>
      <div>Manager Sign: __________</div>
    </div>

  </div>

  </body>
  </html>
  `);

  win.document.close();
  win.print();
}

// ==============================
function goBack(){
  window.location.href = "index.html";
}

// ==============================
window.onload = loadData;

</script>

</body>
</html>
