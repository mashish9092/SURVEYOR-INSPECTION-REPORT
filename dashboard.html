<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">Survey System Dashboard</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="dashboard.html" class="active">📊 Dashboard</a>
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
  
</div>

<!-- MAIN -->
<div class="main">

<div class="box">

<h2>📊 Dashboard Overview</h2>

<!-- CARDS -->
<div class="cards">

  <div class="card">
    <h3>Total Entries</h3>
    <p id="total"></p>
  </div>

  <div class="card">
    <h3>Total Quantity</h3>
    <p id="qty"></p>
  </div>

  <div class="card">
    <h3>Avg Moisture</h3>
    <p id="moisture"></p>
  </div>

  <div class="card">
    <h3>FAQ Count</h3>
    <p id="faq"></p>
  </div>

</div>

<br>
<input type="text" placeholder="Search..." onkeyup="searchData()">

<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
<!-- TABLE VIEW -->
<h3>📋 Data Summary</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Qty</th>
<th>Moisture</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Survey System | Developed by Ashish Mehra | Maintenance & Support Active
</div>
<script>

const API_URL = "PASTE_YOUR_SCRIPT_URL_HERE"; // 👈 यहाँ URL डालो

let fullData = [];
let currentPage = 1;
let rowsPerPage = 10;

// LOAD DATA
async function loadData(){
  const res = await fetch(API_URL);
  fullData = await res.json();

  renderTable();
  updateStats();
}

// TABLE SHOW
function renderTable(){

  let start = (currentPage - 1) * rowsPerPage;
  let end = start + rowsPerPage;

  let data = fullData.slice(start, end);

  let html = "";

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${start+i+1}</td>
      <td>${r["Name Of Farmer/Society"]}</td>
      <td>${r["Farmer Registration"]}</td>
      <td>${r["Qty In Quintals (Approx)"]}</td>
      <td>${r["MOISTURE (12%)"]}</td>
      <td>${r["Status FAQ/Non FAQ"]}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// STATS
function updateStats(){

  document.getElementById("total").innerText = fullData.length;

  let totalQty = 0;
  let moisture = 0;
  let faq = 0;

  fullData.forEach(r=>{
    totalQty += Number(r["Qty In Quintals (Approx)"] || 0);
    moisture += Number(r["MOISTURE (12%)"] || 0);

    if(r["Status FAQ/Non FAQ"] === "FAQ") faq++;
  });

  document.getElementById("qty").innerText = totalQty;
  document.getElementById("moisture").innerText = (moisture/fullData.length).toFixed(2);
  document.getElementById("faq").innerText = faq;
}

// LOAD
loadData();

</script>
</body>
</html>
