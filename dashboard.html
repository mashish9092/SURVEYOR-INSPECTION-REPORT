<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body{font-family:Arial;background:#f4f6f9;}
.main{width:95%;max-width:1200px;margin:auto;}

.table-container{
  overflow-x:auto;
  background:white;
  padding:15px;
  border-radius:10px;
}

table{width:100%;border-collapse:collapse;}
th{background:#2f6ecb;color:white;padding:10px;}
td{padding:8px;border:1px solid #ddd;text-align:center;}

button{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.back{background:#4caf50;color:white;margin-bottom:10px;}
.print{background:#28a745;color:white;}

input{
  padding:8px;
  width:250px;
  margin-bottom:10px;
}

.pagination button{
  margin:3px;
  background:#ddd;
}
</style>
</head>

<body>

<div class="main">

<h2>📊 Dashboard</h2>

<button class="back" onclick="goBack()">⬅ Back</button>

<br>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="filterData()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty</th>
<th>Foreign</th>
<th>Other</th>
<th>Damaged (2%)</th>
<th>Slight (4%)</th>
<th>Damaged (6%)</th>
<th>Moisture</th>
<th>Status</th>
<th>Remark</th>
<th>Print</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>
</div>

<br>

<div class="pagination" id="pagination"></div>

</div>

<script src="config.js"></script>

<script>

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;

// ==============================
// LOAD DATA
// ==============================
async function loadData(){
  let res = await fetch(API_MAIN);
  allData = await res.json();

  filteredData = [...allData].reverse();
  renderTable();
}

// ==============================
// RENDER TABLE
// ==============================
function renderTable(){

  let start = (currentPage-1) * rowsPerPage;
  let end = start + rowsPerPage;

  let pageData = filteredData.slice(start,end);

  let html = "";

  pageData.forEach((r,i)=>{

    html += `
    <tr>
      <td>${start + i + 1}</td>
      <td>${r["Name Of Farmer/Society"] || ""}</td>
      <td>${r["Farmer Registration"] || ""}</td>
      <td>${r["Qty In Quintals (Approx)"] || ""}</td>
      <td>${r["FOREIGN MATTER (0.75%)"] || ""}</td>
      <td>${r["OTHER FOOD GRAINS (2%)"] || ""}</td>
      <td>${r["DAMAGED GRAINS (2%)"] || ""}</td>
      <td>${r["SLIGHT DAMAGED GRAINS (4%)"] || ""}</td>
      <td>${r["DAMAGED GRAINS (6%)"] || ""}</td>
      <td>${r["MOISTURE (12%)"] || ""}</td>
      <td>${r["Status FAQ/Non FAQ"] || ""}</td>
      <td>${r["Remark If Any"] || ""}</td>
      <td>
        <button class="print" onclick='printRow(${JSON.stringify(r)})'>Print</button>
      </td>
    </tr>`;
  });

  document.getElementById("dataBody").innerHTML = html;

  renderPagination();
}

// ==============================
// SEARCH
// ==============================
function filterData(){

  let val = document.getElementById("search").value.toLowerCase();

  filteredData = allData.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(val)
  );

  currentPage = 1;
  renderTable();
}

// ==============================
// PAGINATION
// ==============================
function renderPagination(){

  let totalPages = Math.ceil(filteredData.length / rowsPerPage);
  let html = "";

  for(let i=1;i<=totalPages;i++){
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function goPage(page){
  currentPage = page;
  renderTable();
}

// ==============================
// PRINT FUNCTION (FINAL FORMAT)
// ==============================
function printRow(data){

  let win = window.open('', '', 'width=1200,height=800');

  win.document.write(`
  <html>
  <head>
  <title>Print</title>

  <style>
    body{font-family:Arial;margin:10px;}
    .box{border:2px solid black;padding:10px;}

    .header{text-align:center;font-weight:bold;}
    .title{font-size:20px;}
    .sub{font-size:14px;}

    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th, td{border:1px solid black;padding:6px;font-size:12px;text-align:center;}

    .row{display:flex;justify-content:space-between;margin-top:10px;}
    .sign{margin-top:30px;display:flex;justify-content:space-between;}
  </style>

  </head>

  <body>

  <div class="box">

    <div class="header">
      <div class="title">R B ASSOCIATES GLOBAL CONNECT PVT LTD</div>
      <div>SURVEYOR INSPECTION REPORT</div>
      <div class="sub">(District Narsinghpur)</div>
      <div class="sub">For Procurement Centre</div>
    </div>

    <br>

    <div class="row">
      <div><b>Grader/Surveyor Name :</b> __________</div>
    </div>

    <div class="row">
      <div><b>Warehouse Name :</b> __________</div>
      <div><b>Date :</b> __________</div>
    </div>

    <div class="row">
      <div><b>Society :</b> __________</div>
    </div>

    <br>

    <b>COMMODITY : WHEAT</b>

    <table>
      <tr>
        <th>Sr.No</th>
        <th>Name</th>
        <th>Reg</th>
        <th>Qty</th>
        <th>Foreign</th>
        <th>Other</th>
        <th>Damaged(2%)</th>
        <th>Slight</th>
        <th>Damaged(6%)</th>
        <th>Moisture</th>
        <th>Status</th>
        <th>Remark</th>
      </tr>

      <tr>
        <td>1</td>
        <td>${data["Name Of Farmer/Society"]}</td>
        <td>${data["Farmer Registration"]}</td>
        <td>${data["Qty In Quintals (Approx)"]}</td>
        <td>${data["FOREIGN MATTER (0.75%)"]}</td>
        <td>${data["OTHER FOOD GRAINS (2%)"]}</td>
        <td>${data["DAMAGED GRAINS (2%)"]}</td>
        <td>${data["SLIGHT DAMAGED GRAINS (4%)"]}</td>
        <td>${data["DAMAGED GRAINS (6%)"]}</td>
        <td>${data["MOISTURE (12%)"]}</td>
        <td>${data["Status FAQ/Non FAQ"]}</td>
        <td>${data["Remark If Any"]}</td>
      </tr>

      ${"<tr>" + "<td></td>".repeat(12) + "</tr>".repeat(8)}

    </table>

    <div class="sign">
      <div>Name & Signature Of Surveyor : __________</div>
      <div>Name & Signature Of Warehouse Manager : __________</div>
    </div>

  </div>

  </body>
  </html>
  `);

  win.document.close();
  win.print();
}

// ==============================
// BACK BUTTON
// ==============================
function goBack(){
  window.location.href = "index.html";
}

// ==============================
window.onload = loadData;

</script>

</body>
</html>
