<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

<h2>📊 Dashboard</h2>

<button onclick="goBack()">⬅ Back to Entry</button>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN MATTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status</th>
<th>Remark</th>
</tr>
</thead>

<tbody id="dashboardBody"></tbody>
</table>
</div>

</div>

<script src="config.js"></script>

<script>

// 🔵 LOAD DATA FROM GOOGLE SHEET
async function loadData(){

  let res = await fetch(API_MAIN);
  let data = await res.json();

  let html = "";

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r["Name Of Farmer/Society"]}</td>
      <td>${r["Farmer Registration"]}</td>
      <td>${r["Qty In Quintals (Approx)"]}</td>
      <td>${r["FOREIGN MATTER (0.75%)"]}</td>
      <td>${r["OTHER FOOD GRAINS (2%)"]}</td>
      <td>${r["DAMAGED GRAINS (2%)"]}</td>
      <td>${r["SLIGHT DAMAGED GRAINS (4%)"]}</td>
      <td>${r["DAMAGED GRAINS (6%)"]}</td>
      <td>${r["MOISTURE (12%)"]}</td>
      <td>${r["Status FAQ/Non FAQ"]}</td>
      <td>${r["Remark If Any"]}</td>
    </tr>`;
  });

  document.getElementById("dashboardBody").innerHTML = html;
}

// 🔙 BACK BUTTON
function goBack(){
  window.location.href = "index.html";
}

window.onload = loadData;

</script>

</body>
</html>
