<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body{font-family:Arial;background:#f4f6f9;}
.main{width:95%;max-width:1200px;margin:auto;}

.table-container{
  overflow-x:auto;
  background:white;
  padding:15px;
  border-radius:10px;
}

table{width:100%;border-collapse:collapse;}
th{background:#2f6ecb;color:white;padding:10px;}
td{padding:8px;border:1px solid #ddd;text-align:center;}

button{
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.back{background:#4caf50;color:white;margin-bottom:10px;}
.print{background:#28a745;color:white;}

input{padding:8px;width:250px;margin-bottom:10px;}

.pagination button{
  margin:3px;
}
</style>
</head>

<body>

<div class="main">

<h2>📊 Dashboard</h2>

<button class="back" onclick="goBack()">⬅ Back</button>

<br>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="filterData()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Farmer Registration</th>
<th>Qty In Quintals (Approx)</th>
<th>FOREIGN MATTER (0.75%)</th>
<th>OTHER FOOD GRAINS (2%)</th>
<th>DAMAGED GRAINS (2%)</th>
<th>SLIGHT DAMAGED GRAINS (4%)</th>
<th>DAMAGED GRAINS (6%)</th>
<th>MOISTURE (12%)</th>
<th>Status FAQ/Non FAQ</th>
<th>Remark If Any</th>
<th>Print</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>
</table>
</div>

<br>

<div class="pagination" id="pagination"></div>

</div>

<script src="config.js"></script>

<script>

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;

// 🔵 LOAD DATA
async function loadData(){
  let res = await fetch(API_MAIN);
  allData = await res.json();

  filteredData = [...allData].reverse();
  renderTable();
}

// 🔵 RENDER TABLE
function renderTable(){

  let start = (currentPage-1) * rowsPerPage;
  let end = start + rowsPerPage;

  let pageData = filteredData.slice(start,end);

  let html = "";

  pageData.forEach((r,i)=>{

    html += `
    <tr>
      <td>${start + i + 1}</td>
      <td>${r["Name Of Farmer/Society"]}</td>
      <td>${r["Farmer Registration"]}</td>
      <td>${r["Qty In Quintals (Approx)"]}</td>
      <td>${r["FOREIGN MATTER (0.75%)"]}</td>
      <td>${r["OTHER FOOD GRAINS (2%)"]}</td>
      <td>${r["DAMAGED GRAINS (2%)"]}</td>
      <td>${r["SLIGHT DAMAGED GRAINS (4%)"]}</td>
      <td>${r["DAMAGED GRAINS (6%)"]}</td>
      <td>${r["MOISTURE (12%)"]}</td>
      <td>${r["Status FAQ/Non FAQ"]}</td>
      <td>${r["Remark If Any"]}</td>
      <td>
        <button class="print" onclick='printRow(${JSON.stringify(r)})'>Print</button>
      </td>
    </tr>`;
  });

  document.getElementById("dataBody").innerHTML = html;

  renderPagination();
}

// 🔍 SEARCH
function filterData(){

  let val = document.getElementById("search").value.toLowerCase();

  filteredData = allData.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(val)
  );

  currentPage = 1;
  renderTable();
}

// 📄 PAGINATION
function renderPagination(){

  let totalPages = Math.ceil(filteredData.length / rowsPerPage);
  let html = "";

  for(let i=1;i<=totalPages;i++){
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function goPage(page){
  currentPage = page;
  renderTable();
}

// 🖨 PRINT SINGLE RECORD
function printRow(data){

  let win = window.open('', '', 'width=900,height=700');

  win.document.write(`
  <html>
  <head>
  <title>Print</title>
  <style>
    body{font-family:Arial;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #000;padding:6px;text-align:center;}
  </style>
  </head>
  <body>

  <h2 style="text-align:center;">R B ASSOCIATES GLOBAL CONNECT PVT LTD</h2>
  <h3 style="text-align:center;">SURVEYOR INSPECTION REPORT</h3>

  <br>

  <table>
  <tr>
    <th>Name</th>
    <th>Reg</th>
    <th>Qty</th>
    <th>Foreign</th>
    <th>Other</th>
    <th>Damaged(2%)</th>
    <th>Slight</th>
    <th>Damaged(6%)</th>
    <th>Moisture</th>
    <th>Status</th>
    <th>Remark</th>
  </tr>

  <tr>
    <td>${data["Name Of Farmer/Society"]}</td>
    <td>${data["Farmer Registration"]}</td>
    <td>${data["Qty In Quintals (Approx)"]}</td>
    <td>${data["FOREIGN MATTER (0.75%)"]}</td>
    <td>${data["OTHER FOOD GRAINS (2%)"]}</td>
    <td>${data["DAMAGED GRAINS (2%)"]}</td>
    <td>${data["SLIGHT DAMAGED GRAINS (4%)"]}</td>
    <td>${data["DAMAGED GRAINS (6%)"]}</td>
    <td>${data["MOISTURE (12%)"]}</td>
    <td>${data["Status FAQ/Non FAQ"]}</td>
    <td>${data["Remark If Any"]}</td>
  </tr>
  </table>

  <br><br>

  <p>Name & Signature Of Surveyor: _______________________</p>
  <p>Name & Signature Of Warehouse Manager: ______________</p>

  </body>
  </html>
  `);

  win.document.close();
  win.print();
}

// 🔙 BACK
function goBack(){
  window.location.href = "index.html";
}

window.onload = loadData;

</script>

</body>
</html>
