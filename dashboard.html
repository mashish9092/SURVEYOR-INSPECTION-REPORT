<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">Survey System Dashboard</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="index.html">📋 Entry Form</a>
  <a href="report.html">📄 Report</a>
  <a href="dashboard.html" class="active">📊 Dashboard</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="box">

<h2>📊 Dashboard Overview</h2>

<!-- CARDS -->
<div class="cards">

  <div class="card">
    <h3>Total Entries</h3>
    <p id="total"></p>
  </div>

  <div class="card">
    <h3>Total Quantity</h3>
    <p id="qty"></p>
  </div>

  <div class="card">
    <h3>Avg Moisture</h3>
    <p id="moisture"></p>
  </div>

  <div class="card">
    <h3>FAQ Count</h3>
    <p id="faq"></p>
  </div>

</div>

<br>

<!-- TABLE VIEW -->
<h3>📋 Data Summary</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>Sr.No</th>
<th>Name Of Farmer/Society</th>
<th>Qty</th>
<th>Moisture</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Survey System | Developed by Ashish Mehra | Maintenance & Support Active
</div>

<script>

const data = JSON.parse(localStorage.getItem("reportData"));

if(!data){
  alert("No Data Found");
}

// CALCULATIONS
let total = data.rows.length;
let totalQty = 0;
let totalMoisture = 0;
let faq = 0;

data.rows.forEach(r=>{
  totalQty += Number(r.qty || 0);
  totalMoisture += Number(r.m || 0);
  if(r.s === "FAQ") faq++;
});

// DISPLAY
document.getElementById("total").innerText = total;
document.getElementById("qty").innerText = totalQty;
document.getElementById("moisture").innerText = (totalMoisture / total).toFixed(2);
document.getElementById("faq").innerText = faq;

// TABLE
let html = "";

data.rows.forEach((r,i)=>{
  html += `
  <tr>
    <td>${i+1}</td>
    <td>${r.name}</td>
    <td>${r.reg}</td>
    <td>${r.qty}</td>
    <td>${r.f}</td>
    <td>${r.o}</td>
    <td>${r.d2}</td>
    <td>${r.d4}</td>
    <td>${r.d6}</td>
    <td>${r.m}</td>
    <td>${r.s}</td>
    <td>${r.r}</td>
  </tr>`;
});

document.getElementById("table").innerHTML = html;

</script>

</body>
</html>
